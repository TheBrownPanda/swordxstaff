<div class="modal-bg" id="modal"><div class="detail"><div class="detail-handle"></div><div id="detail-content"></div></div></div>

<script>
const SB="https://ysxbglavmdngayvinrzk.supabase.co",SK="sb_publishable_w9keP2-21tJKR6FcF0YIQA_6q3ykBk-";
const IB=`${SB}/storage/v1/object/public/skill-icons`,LW="https://lootandwaifus.com/skills/swordxstaff";
const TS="https://www.tsueken.com/content/assets/skills";
const RCOL={Rare:"#5f9aff",Epic:"#9660c4",Legendary:"#e68a23",Mythic:"#ebed63",Divine:"#e05252",Immortal:"#e884e8"};
const RFLOW=["Rare","Epic","Legendary","Mythic","Divine","Immortal"];
const PROF_COL={
  Warrior:"#e05252",Knight:"#5b8dd9",Gladiator:"#e8943a",Paladin:"#4a7bc8",Berserker:"#cc4422",
  Guardian:"#3a6ab5",Conqueror:"#b33318","Templar":"#2d5a9e","Ravager":"#992210",
  "Firmament Paladin":"#2662a5","Meteor Gladiator":"#c03010","Aurora Paladin":"#2255a0",
  Mage:"#9b59b6",Sorcerer:"#8e44ad",Sage:"#27ae60",Magus:"#7d3c98",Occultist:"#1e8449",
  Destroyer:"#6c3483",Controller:"#196f3d","Magister":"#5b2c6f","Prophet":"#145a32",
  "Burst Magus":"#5522a0","Truth Sage King":"#116633","Radiance Magus":"#4a1a80","Spirit Star Sage":"#0d5028"
};
const TIERS=["T1","T2","T3","T4","T5","T6","T7"];
const CLASS_PATHS=[
  {name:"Knight Path",icon:"⚔️",classes:[
    {name:"Warrior",tier:"T1"},{name:"Knight",tier:"T2"},{name:"Paladin",tier:"T3"},
    {name:"Guardian",tier:"T4"},{name:"Templar",tier:"T5"},
    {name:"Firmament Paladin",tier:"T6"},{name:"Aurora Paladin",tier:"T7"}
  ]},
  {name:"Duelist Path",icon:"⚔️",classes:[
    {name:"Warrior",tier:"T1"},{name:"Duelist",tier:"T2"},{name:"Berserker",tier:"T3"},
    {name:"Conqueror",tier:"T4"},{name:"Ravager",tier:"T5"},
    {name:"Phantom Blade",tier:"T6"},{name:"Meteor Gladiator",tier:"T7"}
  ]},
  {name:"Sorcerer Path",icon:"🔮",classes:[
    {name:"Mage",tier:"T1"},{name:"Sorcerer",tier:"T2"},{name:"Archmage",tier:"T3"},
    {name:"Destroyer",tier:"T4"},{name:"Magister",tier:"T5"},
    {name:"Burst Magus",tier:"T6"},{name:"Radiance Magus",tier:"T7"}
  ]},
  {name:"Sage Path",icon:"🔮",classes:[
    {name:"Mage",tier:"T1"},{name:"Sage",tier:"T2"},{name:"Arcanist",tier:"T3"},
    {name:"Dominator",tier:"T4"},{name:"Prophet",tier:"T5"},
    {name:"Truth Sage King",tier:"T6"},{name:"Spirit Star Sage",tier:"T7"}
  ]},
];
const FIELD_LABELS={
  SkillAttack1:"Damage",SkillAttack2:"Damage 2",SkillAttack3:"Damage 3",SkillAttack4:"Damage 4",
  SkillCureByHp:"Heal (HP%)",SkillCureByAttack:"Heal (ATK%)",SkillCureByTargetHp:"Heal (Target HP%)",
  ShieldByTargetHp:"Shield (Target HP%)",ShieldByConvertedCurHp:"Shield (Cur HP%)",ShieldByDefence:"Shield (DEF%)",
  StatusDmgAddPer:"Damage increase",StatusDmgReducePer:"Damage reduction",
  StatusDmgVulnerablePer:"Vulnerability",StatusShieldAddPercent:"Shield increase",
  StatusTypeDmgAddPer:"Type DMG increase",StatusIgnoreDefence:"DEF ignore",
  AttackScale:"ATK increase",DefenceScale:"DEF increase",MaxHpScale:"HP increase",SpeedScale:"SPD increase",
  DistanceAddDmgPercent:"Distance DMG",OnceHitHemophagiaPer:"Lifesteal",
  DamageByDamage:"DMG (by DMG)",DamageByMaxHp:"DMG (by HP)",SuckHpByDamage:"HP drain",
  SkillCostByCurHp:"HP cost (cur)",SkillCostByMaxHp:"HP cost (max)",
  SkillTargetReduceHpPer:"Target HP reduction",SkillDmgUnitAddPer:"DMG per unit",
  SkillDmgMaxAddPer:"Max DMG bonus",SkillDmgAddPerByTargetHp:"DMG by target HP",
  SkillDmgAddPerByLargeTarget:"DMG vs large",
  StatusAdd1:"Status 1",StatusAdd2:"Status 2",StatusAdd3:"Status 3",StatusAdd4:"Status 4",
  BreakResilience:"Resilience Break",BreakResiliencePercent:"Resilience Break",
  CritRatePercent:"Crit Rate",CritAvoidPercent:"Crit Resist",
  BlockPercent:"Block Rate",BlockAvoidPercent:"Accuracy",
  DmgAddPercent:"DMG+%",DmgReducePercent:"DMG Resist%",FinalDamageReducePercent:"Final DMG Resist%",
  CureAdd:"Heal+",BeCureAdd:"Heal Received+",
  FixedCritPower:"Crit DMG",FixedBlockValue:"Block Value",
  FixedDmgAdd:"Flat DMG+",FixedDmgReduce:"Flat DMG Resist",
  FixedAttack:"Flat ATK",FixedDefence:"Flat DEF",FixedMaxHp:"Flat HP",FixedSpeed:"Flat SPD",
};
const FACTOR_LABELS={
  Defence:"DEF",Attack:"ATK",MaxHp:"HP",Speed:"SPD",
  EffectDodge:"Effect Resist",EffectRate:"Effect Hit",
  CritRatePercentValue:"Crit Rate",CritAvoidPercentValue:"Crit Resist",
  BlockPercentValue:"Block Rate",BlockAvoidPercentValue:"Accuracy",
  ElementMaster:"Elem Mastery",ElementResistance:"Elem Resist",
  KongFuMaster:"Phys Mastery",KongFuResistance:"Phys Resist",
  CritPower:"Crit DMG",BlockValue:"Block Value",
  BreakResiliencePercent:"Resilience Break",DmgAddPercent:"DMG+%",DmgReducePercent:"DMG Resist%",
};

let ALL=[],fTier="all",fType="all",fProf="all",selRarity="Legendary";
function iu(s){const n=(s.id||"").replace("skill_","");return`${IB}/skill_${n}.webp`}
function iuf(s){const n=(s.id||"").replace("skill_","");return`${IB}/sprite_skill_${n}.png`}
function iuf2(s){return`${LW}/${s.id}.png`}
function imgTag(s,cls){
  return`<img class="${cls||''}" src="${iu(s)}" onerror="this.onerror=()=>{this.onerror=null;this.src='${iuf2(s)}'};this.src='${iuf(s)}'" loading="lazy">`
}
function profColor(p){return PROF_COL[p]||"#888"}
function fmt(v){if(v>=1e6)return(v/1e6).toFixed(1)+"M";if(v>=1e3)return(v/1e3).toFixed(1)+"K";return String(Math.round(v))}

function getMainStat(sk,rarity){
  const sbr=sk.stats_by_rarity;
  if(sbr&&sbr[rarity]){
    const st=sbr[rarity];
    for(const k of["SkillAttack1","SkillCureByHp","SkillCureByAttack","ShieldByDefence","ShieldByTargetHp","ShieldByConvertedCurHp","StatusDmgAddPer","StatusDmgReducePer","AttackScale","DefenceScale"]){
      if(st[k]&&typeof st[k]==="object"&&(st[k].pct||st[k].flat))
        return{label:FIELD_LABELS[k]||k,pct:st[k].pct,flat:st[k].flat};
    }
  }
  // Check extra_entity_stats for buffs (paired or standalone)
  if(sk.extra_entity_stats){
    for(const ex of sk.extra_entity_stats){
      const est=ex.stats&&ex.stats[rarity];
      if(!est)continue;
      for(const[k,v]of Object.entries(est)){
        if(k==="CD")continue;
        if(typeof v==="object"&&(v.pct||v.flat))
          return{label:FIELD_LABELS[k]||k,pct:v.pct,flat:v.flat};
        if(typeof v==="number"&&v)
          return{label:FIELD_LABELS[k]||k,pct:v,flat:0,standalone:true};
      }
    }
  }
  // Check passive_status_stats
  if(sk.passive_status_stats){
    for(const ps of sk.passive_status_stats){
      const pst=ps.stats&&ps.stats[rarity];
      if(!pst)continue;
      for(const[k,v]of Object.entries(pst)){
        if(k==="CD")continue;
        if(typeof v==="object"&&(v.pct||v.flat))
          return{label:FIELD_LABELS[k]||k,pct:v.pct,flat:v.flat};
        if(typeof v==="number"&&v)
          return{label:FIELD_LABELS[k]||k,pct:v,flat:0,standalone:true};
      }
    }
  }
  // Check passive_factor_stats
  if(sk.passive_factor_stats&&sk.passive_factor_stats[rarity]){
    const pfs=sk.passive_factor_stats[rarity];
    for(const[k,v]of Object.entries(pfs)){
      if(v.flat)return{label:v.label||k,pct:v.pct||0,flat:v.flat,standalone:!v.pct};
      if(v.value)return{label:v.label||k,pct:v.value,flat:0,standalone:true};
    }
  }
  return null;
}
function fmtStat(s){
  if(!s)return"";
  if(s.standalone)return fmt(s.pct||s.flat);
  if(!s.pct)return fmt(s.flat);
  if(!s.flat)return`${s.pct}%`;
  return`${s.pct}% + ${fmt(s.flat)}`;
}

function render(){
  const q=(document.getElementById("q")?.value||"").toLowerCase();
  let sk=ALL.filter(s=>s.name);
  if(fTier!=="all")sk=sk.filter(s=>s.tier===fTier);
  if(fType!=="all")sk=sk.filter(s=>fType==="Technique"?s.type==="combat":s.type==="arcane");
  if(fProf!=="all")sk=sk.filter(s=>s.profession===fProf);
  if(q)sk=sk.filter(s=>s.name.toLowerCase().includes(q)||(s.cn_name||"").toLowerCase().includes(q)||(s.description||"").toLowerCase().includes(q)||(s.profession||"").toLowerCase().includes(q));

  // Get unique professions for filter
  const profs=[...new Set(ALL.filter(s=>s.name&&s.profession).map(s=>s.profession))].sort();

  let h=`<div class="search-bar"><span class="ico">🔍</span><input id="q" placeholder="Search by name, class, or keyword..." oninput="render()" value="${q.replace(/"/g,'&quot;')}" autocomplete="off" autocorrect="off"></div>`;

  // Type + Tier filters
  h+=`<div class="filter-bar">`;
  h+=`<button class="pill${fType==="all"?" on":""}" onclick="fType='all';render()">All Types</button>`;
  h+=`<button class="pill${fType==="Technique"?" on":""}" style="${fType==="Technique"?"color:var(--tech);border-color:var(--tech)":""}" onclick="fType='Technique';render()">Techniques</button>`;
  h+=`<button class="pill${fType==="Charm"?" on":""}" style="${fType==="Charm"?"color:var(--chrm);border-color:var(--chrm)":""}" onclick="fType='Charm';render()">Charms</button>`;
  h+=`<div class="pill-sep"></div>`;
  TIERS.forEach(t=>{h+=`<button class="pill${fTier===t?" on":""}" onclick="fTier=fTier==='${t}'?'all':'${t}';render()">${t}</button>`});
  h+=`</div>`;

  // Class filter — organized by promotion path
  h+=`<div class="class-paths">`;
  h+=`<button class="pill${fProf==="all"?" on":""}" onclick="fProf='all';render()" style="margin-bottom:8px">All Classes</button>`;
  CLASS_PATHS.forEach(path=>{
    h+=`<div class="path-row"><span class="path-label">${path.icon} ${path.name}</span><div class="path-pills">`;
    path.classes.forEach(cls=>{
      const exists=profs.includes(cls.name);
      if(!exists)return;
      const c=profColor(cls.name);
      const on=fProf===cls.name;
      h+=`<button class="pill cpill${on?" on":""}" style="${on?`color:${c};border-color:${c}`:""}" onclick="fProf=fProf==='${cls.name}'?'all':'${cls.name}';render()"><span class="cpill-name">${cls.name}</span><span class="cpill-tier">${cls.tier}</span></button>`;
    });
    h+=`</div></div>`;
  });
  h+=`</div>`;

  // Rarity selector
  h+=`<div class="filter-bar">`;
  h+=`<span style="font-size:12px;color:var(--tx3);font-weight:600;padding:8px 4px">Stats @</span>`;
  RFLOW.forEach(r=>{
    const on=selRarity===r;
    h+=`<button class="pill${on?" on":""}" style="${on?`background:${RCOL[r]};color:#0a0a16;border-color:${RCOL[r]}`:`color:${RCOL[r]}`}" onclick="selRarity='${r}';render()">${r}</button>`;
  });
  h+=`</div>`;

  h+=`<div class="skill-count">${sk.length} skill${sk.length!==1?"s":""}</div>`;
  h+=`<div class="grid">`;
  sk.forEach(s=>{
    const pc=profColor(s.profession);
    const rc=RCOL[s.initial_rarity]||"#888";
    const isT=s.type==="combat";
    const ms=getMainStat(s,selRarity);
    h+=`<div class="sk" onclick="openDetail('${s.id}')">`;
    h+=`<div class="sk-icon">${imgTag(s)}</div>`;
    h+=`<div class="sk-info"><div class="sk-name">${s.name}</div><div class="sk-row">`;
    h+=`<span class="sk-badge" style="background:${pc}18;color:${pc};border-color:${pc}33">${s.profession||s.class||""}</span>`;
    h+=`<span class="sk-badge" style="background:${isT?"var(--tech)":"var(--chrm)"}18;color:${isT?"var(--tech)":"var(--chrm)"};border-color:${isT?"var(--tech)":"var(--chrm)"}33">${isT?"Technique":"Charm"}</span>`;
    h+=`<span class="sk-badge" style="background:${rc}18;color:${rc};border-color:${rc}33">${s.initial_rarity||""}</span>`;
    if(ms)h+=`<span class="sk-dmg">${fmtStat(ms)}</span>`;
    h+=`</div></div></div>`;
  });
  h+=`</div><div class="footer">Sword × Staff Skill Database • ${ALL.length} skills</div>`;
  document.getElementById("app").innerHTML=h;
}

function renderRangeGrid(cells){
  if(!cells||!cells.length)return"";
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  const set=new Set();
  cells.forEach(c=>{
    minX=Math.min(minX,c.x);maxX=Math.max(maxX,c.x);
    minY=Math.min(minY,c.y);maxY=Math.max(maxY,c.y);
    set.add(`${c.x},${c.y}`);
  });
  // Include caster position
  minX=Math.min(minX,0);maxX=Math.max(maxX,0);
  minY=Math.min(minY,0);maxY=Math.max(maxY,0);
  // Add 1 cell padding
  minX--;maxX++;minY--;maxY++;
  const cols=maxX-minX+1,rows=maxY-minY+1;
  let g=`<div class="range-section"><div class="stat-section-title">Range</div>`;
  g+=`<div class="range-grid" style="grid-template-columns:repeat(${cols},14px)">`;
  for(let y=minY;y<=maxY;y++){
    for(let x=minX;x<=maxX;x++){
      const isSelf=x===0&&y===0;
      const isHit=set.has(`${x},${y}`);
      g+=`<div class="range-cell${isHit?" hit":""}${isSelf?" self":""}"></div>`;
    }
  }
  g+=`</div><div class="range-label"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#3aa5e8;vertical-align:middle;margin-right:4px"></span>Self <span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#e05040;vertical-align:middle;margin:0 4px 0 10px"></span>Hit area</div></div>`;
  return g;
}

function renderStats(sk,rarity,star,level){
  let rows=[];
  if(!CURVES){
    // Fallback to precomputed if curves not loaded
    const sbr=sk.stats_by_rarity;if(sbr&&sbr[rarity])for(const[k,v]of Object.entries(sbr[rarity])){if(k==="CD")continue;if(typeof v==="object"&&(v.pct||v.flat))rows.push({label:FIELD_LABELS[k]||k,val:`${v.pct}% + ${fmt(v.flat)}`})}
    if(sk.passive_factor_stats&&sk.passive_factor_stats[rarity])for(const[k,v]of Object.entries(sk.passive_factor_stats[rarity])){if(v.pct||v.flat)rows.push({label:v.label||k,val:v.pct?`${v.pct}% + ${fmt(v.flat)}`:fmt(v.flat)})}
  } else {
    // Dynamic computation from curves
    const RC=CURVES, rt=RC.rank_table, rm=RC.rarity_meta;
    const rCode=RCODE[rarity]||'SSR';
    const rankNo=parseInt(rt[rCode]?.[String(star)]||rt[rCode]?.['0']||6);
    const subrank=rm[rCode]?.subrank||'';
    
    function getLvRow(gid){
      const cid=RC.group_level_map?.[String(gid)]?.[subrank];
      if(!cid)return{};
      for(const bk of['fixed_curves','all_fixed_curves']){
        const b=RC[bk]?.[String(cid)];if(!b)continue;
        const lvs=Object.keys(b).map(Number).sort((a,b)=>a-b);
        let sel=lvs[0]||0;for(const l of lvs)if(l<=level)sel=l;
        return b[String(sel)]||{};
      }
      return{};
    }
    function computeEntity(ent){
      const ev=ent.entity_values||{},rp=ent.rank_prop_id,gid=ent.group_level_prop_id;
      const cs=ent.curve_source||'skill';
      const bucket=cs==='status'?'status_curves':'rank_curves';
      const rr=RC[bucket]?.[String(rp)]?.[String(rankNo)]||{};
      const lr=getLvRow(gid);
      const res=[];const done=new Set();
      for(const[f,base]of Object.entries(ev)){
        if(f==='CD'||done.has(f))continue;
        const paired=FPAIR[f];
        if(paired){
          const pb=Number(base),ps=Number(rr[f]||0);
          const pv=pb&&ps?(pb*ps)/1e6:0;
          const fb=Number(ev[paired]||0),fr=Number(rr[paired]||0),fl=Number(lr[paired]||0);
          const fv=fl&&fb&&fr?(fl*fb*fr)/1e8:0;
          if(pv||fv)res.push({label:FIELD_LABELS[f]||f,val:`${(Math.round(pv*10)/10)}% + ${fmt(fv)}`});
          done.add(f);done.add(paired);
        }else if(!FPAIRV.has(f)){
          const b=Number(base),s=Number(rr[f]||0);
          const v=b&&s?(b*s)/1e6:0;
          if(v){
            const isPct=f.includes('Percent')||f.includes('Add')||f.includes('Reduce')||f.includes('Scale')||f==='CureAdd'||f==='BeCureAdd';
            res.push({label:FIELD_LABELS[f]||f,val:isPct?`${Math.round(v*10)/10}%`:String(Math.round(v))});
          }
          done.add(f);
        }
      }
      return res;
    }
    function computePassive(sk){
      const pf=sk.passive_factors;if(!pf||!Object.keys(pf).length)return[];
      const rfid=sk.rank_factor_id,rpid=sk.rank_prop_id;
      const rankRow=RC.passive_rank_curves?.[String(rpid)]?.[String(rankNo)]||{};
      const scaleRow=RC.scale_curves?.[String(rfid)]?.[String(rankNo)]||{};
      const levelRow=getLvRow(sk.group_level_prop_id);
      const res=[];const done=new Set();
      for(const f of Object.keys(pf)){
        if(done.has(f))continue;
        const paired=PPAIR[f];
        if(paired&&pf[paired]!=null){
          const factor=Number(pf[f]),rv=Number(rankRow[f]||0);
          const pct=factor&&rv?(factor*rv)/1e6:0;
          let base=Number(levelRow[paired]||0),fv=0;
          if(base){let v=base;const rs=Number(rankRow[paired]||0);if(rs)v*=rs/10000;v*=Number(pf[paired]||0)/10000;const sc=Number(scaleRow[paired]||0);if(sc)v*=sc/10000;fv=v;}
          if(pct||fv)res.push({label:FIELD_LABELS[f]||f,val:`${Math.round(pct*10)/10}% + ${fmt(fv)}`});
          done.add(f);done.add(paired);
        }else if(!PPAIRV.has(f)){
          const isPct=f.endsWith('Percent');
          let v=0;
          if(isPct){const fac=Number(pf[f]),rv=Number(rankRow[f]||0);v=fac&&rv?(fac*rv)/1e6:0;}
          else{let base=Number(levelRow[f]||0);if(base){const rs=Number(rankRow[f]||0);if(rs)base*=rs/10000;base*=Number(pf[f]||0)/10000;const sc=Number(scaleRow[f]||0);if(sc)base*=sc/10000;v=base;}}
          if(v)res.push({label:FIELD_LABELS[f]||f,val:isPct?`${Math.round(v*10)/10}%`:fmt(v)});
          done.add(f);
        }
      }
      return res;
    }
    // Main entity
    if(sk.entity_values&&Object.keys(sk.entity_values).length>1)rows.push(...computeEntity(sk));
    // Extra entities
    (sk.extra_entity_stats||[]).forEach(ex=>rows.push(...computeEntity(ex)));
    // Passive status entities  
    (sk.passive_status_stats||[]).forEach(ps=>rows.push(...computeEntity(ps)));
    // Passive factors
    rows.push(...computePassive(sk));
  }
  if(!rows.length)return"";
  
  // Build UI
  const rr=sk.rarity_range||[];
  const mi=RFLOW.indexOf(rr[0]||"Rare"),mx=RFLOW.indexOf(rr[1]||"Immortal");
  const maxStar=parseInt(CURVES?.rarity_meta?.[RCODE[rarity]]?.max_star||3);
  
  let h=`<div class="stat-section"><div class="stat-section-title">Stats</div>`;
  // Rarity selector
  h+=`<div class="rarity-sel">`;
  for(let i=Math.max(0,mi);i<=Math.min(5,mx);i++){
    const r=RFLOW[i],on=rarity===r;
    h+=`<button class="rsel${on?" on":""}" style="${on?`background:${RCOL[r]};border-color:${RCOL[r]}`:`color:${RCOL[r]}`}" onclick="detailRarity='${r}';refreshDetail()">${r}</button>`;
  }
  h+=`</div>`;
  // Star selector
  h+=`<div class="rarity-sel">`;
  for(let i=0;i<=maxStar;i++){
    const on=star===i;
    h+=`<button class="rsel${on?" on":""}" style="${on?"background:#aaa;color:#111;border-color:#aaa":""}" onclick="detailStar=${i};refreshDetail()">${i} ★</button>`;
  }
  h+=`</div>`;
  // Level selector
  h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">`;
  h+=`<span style="font-size:12px;color:var(--tx3);font-weight:600">Level</span>`;
  h+=`<input type="range" min="1" max="400" value="${level}" oninput="detailLevel=+this.value;document.getElementById('lvl-num').textContent=this.value;refreshDetail()" style="flex:1;accent-color:var(--acc)">`;
  h+=`<span id="lvl-num" style="font-size:14px;font-weight:700;color:var(--acc);min-width:32px">${level}</span>`;
  h+=`</div>`;
  
  rows.forEach(r=>{
    h+=`<div class="stat-row"><span class="stat-label">${r.label}</span><span class="stat-val buff">${r.val}</span></div>`;
  });
  h+=`</div>`;
  return h;
}

let detailSkill=null,detailRarity="Legendary",detailStar=0,detailLevel=1;
let CURVES=null,curvesLoading=false;
const RCODE={Rare:'R',Epic:'SR',Legendary:'SSR',Mythic:'UR',Divine:'LR',Immortal:'ER'};
const FPAIR={SkillAttack1:'SkillFixedAttack1',SkillAttack2:'SkillFixedAttack2',SkillAttack3:'SkillFixedAttack3',SkillAttack4:'SkillFixedAttack4',SkillCureByHp:'SkillFixedCure',SkillCureByAttack:'SkillFixedCure',SkillCureByTargetHp:'SkillFixedCure',DistanceAddDmgPercent:'DistanceAddDmg',ShieldByTargetHp:'SkillFixedShield',ShieldByConvertedCurHp:'SkillFixedShield',ShieldByDefence:'SkillFixedShield',DamageByDamage:'FixedDamageByDamage',DamageByMaxHp:'FixedDamageByMaxHp',SuckHpByDamage:'FixedSuckHp',StatusDmgAddPer:'FixedStatusDmgAdd',StatusDmgReducePer:'FixedStatusDmgReduce',StatusDmgVulnerablePer:'FixedstatusDmgVulnerable',StatusShieldAddPercent:'StatusFixedShieldAdd',StatusTypeDmgAddPer:'FixedStatusTypeDmgAdd',StatusIgnoreDefence:'FixedStatusIgnoreDefence',AttackScale:'FixedAttack',DefenceScale:'FixedDefence',MaxHpScale:'FixedMaxHp',SpeedScale:'FixedSpeed',StatusAdd1:'StatusFixedAdd1',StatusAdd2:'StatusFixedAdd2',StatusAdd3:'StatusFixedAdd3',StatusAdd4:'StatusFixedAdd4'};
const FPAIRV=new Set(Object.values(FPAIR));
const PPAIR={CritRatePercent:'CritRatePercentValue',CritAvoidPercent:'CritAvoidPercentValue',BlockPercent:'BlockPercentValue',BlockAvoidPercent:'BlockAvoidPercentValue',CritPowerPercent:'CritPower',BlockValuePercent:'BlockValue',CureAddPercent:'CureAdd'};
const PPAIRV=new Set(Object.values(PPAIR));

async function loadCurves(){
  if(CURVES||curvesLoading)return;
  curvesLoading=true;
  try{
    const r=await fetch('curves.json');
    CURVES=await r.json();
    console.log('✅ Curves loaded');
    if(detailSkill)refreshDetail();
  }catch(e){console.warn('curves.json not found, using precomputed values');}
  curvesLoading=false;
}

function openDetail(id){
  detailSkill=ALL.find(s=>s.id===id);
  if(!detailSkill)return;
  detailRarity=selRarity;detailStar=0;detailLevel=1;
  loadCurves();
  refreshDetail();
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow="hidden";
}
function refreshDetail(){
  const s=detailSkill;if(!s)return;
  const pc=profColor(s.profession);
  const isT=s.type==="combat";
  let h=`<div class="detail-head">`;
  h+=`<div class="detail-icon">${imgTag(s)}</div>`;
  h+=`<div class="detail-hdr"><div class="detail-name">${s.name}</div>`;
  h+=`<div class="detail-sub">${s.cn_name||""} ${s.name_jp&&s.name_jp!==s.cn_name?"• "+s.name_jp:""}</div>`;
  h+=`<div class="detail-tags">`;
  h+=`<span class="sk-badge" style="background:${pc}18;color:${pc};border-color:${pc}33">${s.profession||""}</span>`;
  h+=`<span class="sk-badge" style="background:${isT?"var(--tech)":"var(--chrm)"}18;color:${isT?"var(--tech)":"var(--chrm)"};border-color:${isT?"var(--tech)":"var(--chrm)"}33">${isT?"Technique":"Charm"}</span>`;
  const rc=RCOL[s.initial_rarity]||"#888";
  h+=`<span class="sk-badge" style="background:${rc}18;color:${rc};border-color:${rc}33">${s.initial_rarity||""}</span>`;
  if(s.tier)h+=`<span class="sk-badge" style="background:rgba(255,255,255,.06);color:var(--tx2);border-color:var(--bdr)">${s.tier}</span>`;
  if(s.cooldown>0)h+=`<span class="sk-badge" style="background:rgba(255,255,255,.06);color:var(--tx2);border-color:var(--bdr)">CD ${s.cooldown}</span>`;
  if(s.element)h+=`<span class="sk-badge" style="background:rgba(255,255,255,.06);color:var(--tx2);border-color:var(--bdr)">${s.element}</span>`;
  h+=`</div></div>`;
  h+=`<button class="detail-close" onclick="closeDetail()">✕</button></div>`;
  h+=`<div class="detail-body">`;

  // Passive factors — only show if we have readable labels, skip raw internal values
  // (The actual scaled values come from status_entities_computed which are shown in renderStats)

  // Stats
  h+=renderStats(s,detailRarity,detailStar,detailLevel);

  // Range grid
  h+=renderRangeGrid(s.hit_cells);

  // Description
  if(s.description){
    h+=`<div class="stat-section-title" style="margin-bottom:8px">Effect</div>`;
    h+=`<div class="desc-box">${s.description}</div>`;
  }

  // Tags
  if(s.tags&&s.tags.length){
    h+=`<div class="stat-section-title" style="margin-bottom:8px">Tags</div>`;
    h+=`<div class="filter-bar" style="margin-bottom:18px">${s.tags.map(t=>`<span class="pill on">${t}</span>`).join("")}</div>`;
  }

  h+=`</div>`;
  document.getElementById("detail-content").innerHTML=h;
}
function closeDetail(){document.getElementById("modal").classList.remove("open");document.body.style.overflow=""}
document.getElementById("modal").addEventListener("click",e=>{if(e.target.id==="modal")closeDetail()});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeDetail()});

async function init(){
  try{
    const r=await fetch(`${SB}/rest/v1/skills?select=*&order=name&limit=500`,{headers:{apikey:SK,Authorization:`Bearer ${SK}`}});
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    ALL=(await r.json()).filter(s=>s.name);
    render();
  }catch(e){
    document.getElementById("app").innerHTML=`<div class="loading"><div>⚠️ Failed to load: ${e.message}</div></div>`;
  }
}
init();
</script>
