<script>
const SB="https://ysxbglavmdngayvinrzk.supabase.co",SK="sb_publishable_w9keP2-21tJKR6FcF0YIQA_6q3ykBk-";
const IB=`${SB}/storage/v1/object/public/skill-icons`,LW="https://lootandwaifus.com/skills/swordxstaff",TS="https://www.tsueken.com/content/assets/skills";
const CL=[
  {id:"Warrior",p:"Sword",c:"#e05252"},
  {id:"Knight",p:"Sword",c:"#5b8dd9",pa:"Warrior"},
  {id:"Duelist",p:"Sword",c:"#e8943a",pa:"Warrior"},
  {id:"Paladin",p:"Sword",c:"#4a7bc8",pa:"Knight"},
  {id:"Berserker",p:"Sword",c:"#cc4422",pa:"Duelist"},
  {id:"Guardian",p:"Sword",c:"#3a6ab5",pa:"Paladin"},
  {id:"Conqueror",p:"Sword",c:"#b33318",pa:"Berserker"},
  {id:"Templar",p:"Sword",c:"#2d5a9e",pa:"Guardian"},
  {id:"Ravager",p:"Sword",c:"#992210",pa:"Conqueror"},
  {id:"Mage",p:"Staff",c:"#9b59b6"},
  {id:"Sorcerer",p:"Staff",c:"#8e44ad",pa:"Mage"},
  {id:"Sage",p:"Staff",c:"#27ae60",pa:"Mage"},
  {id:"Archmage",p:"Staff",c:"#7d3c98",pa:"Sorcerer"},
  {id:"Arcanist",p:"Staff",c:"#1e8449",pa:"Sage"},
  {id:"Destroyer",p:"Staff",c:"#6c3483",pa:"Archmage"},
  {id:"Dominator",p:"Staff",c:"#196f3d",pa:"Arcanist"},
  {id:"Magister",p:"Staff",c:"#5b2c6f",pa:"Destroyer"},
  {id:"Prophet",p:"Staff",c:"#145a32",pa:"Dominator"},
];
const CM=Object.fromEntries(CL.map(c=>[c.id,c]));
function gc(s){const r=[s];let x=s;while(CM[x]?.pa){x=CM[x].pa;r.unshift(x)}return r}
function iu(s){const n=(s.id||"").replace("skill_","");return`${IB}/skill_${n}.webp`}
function iuf(s){const n=(s.id||"").replace("skill_","");return`${IB}/sprite_skill_${n}.png`}
function iuf2(s){return`${LW}/${s.id}.png`}

// ---- Shared data model (matches simulator) ----
let AS=[],SKILL_MAP={},SC=null,LVL=1;
// Slots store {id, rarity, star} objects or null — same format as simulator.js technique_slots/charm_slots
let T=[null,null,null,null],C_=[null,null,null,null];
let PT="Technique",PS=0,PF="all";

const RARITIES=["Rare","Epic","Legendary","Mythic","Divine","Immortal"];
const RCOL={Rare:"#5f9aff",Epic:"#9660c4",Legendary:"#e68a23",Mythic:"#ebed63",Divine:"#e05252",Immortal:"#e884e8"};
const RCODE={Rare:'R',Epic:'SR',Legendary:'SSR',Mythic:'UR',Divine:'LR',Immortal:'ER'};
const FIELD_LABELS={SkillAttack1:"Damage",SkillCureByHp:"Heal (HP%)",SkillCureByAttack:"Heal (ATK%)",ShieldByDefence:"Shield (DEF%)",ShieldByTargetHp:"Shield (Target HP%)",StatusDmgAddPer:"DMG increase",StatusDmgReducePer:"DMG reduction",AttackScale:"ATK increase",DefenceScale:"DEF increase"};
const FPAIR={SkillAttack1:'SkillFixedAttack1',SkillAttack2:'SkillFixedAttack2',SkillAttack3:'SkillFixedAttack3',SkillAttack4:'SkillFixedAttack4',SkillCureByHp:'SkillFixedCure',SkillCureByAttack:'SkillFixedCure',ShieldByDefence:'SkillFixedShield',ShieldByTargetHp:'SkillFixedShield',ShieldByConvertedCurHp:'SkillFixedShield',StatusDmgAddPer:'FixedStatusDmgAdd',AttackScale:'FixedAttack',DefenceScale:'FixedDefence',MaxHpScale:'FixedMaxHp',SpeedScale:'FixedSpeed'};
let RARITY="Legendary";
let CURVES=null;

// ---- Curves loader (same as simulator) ----
async function loadCurves(){
  try{const r=await fetch('curves.json');CURVES=await r.json();renderAll();}catch(e){console.warn('curves.json not found — using precomputed values')}
}

// ---- Skill damage computation (shared with simulator) ----
function getSkillDmg(skill, rarity) {
  const sbr = skill.stats_by_rarity;
  if (sbr && sbr[rarity]) {
    const st = sbr[rarity];
    for (const k of ['SkillAttack1','SkillAttack2','SkillAttack3','SkillAttack4']) {
      if (st[k] && typeof st[k] === 'object') return { pct: st[k].pct || 0, flat: st[k].flat || 0 };
    }
  }
  const RIDX={Rare:1,Epic:4,Legendary:8,Mythic:14,Divine:22,Immortal:33};
  if (skill.damage && skill.damage.length) {
    const v = skill.damage[RIDX[rarity]];
    if (v != null) return { pct: v, flat: 0 };
  }
  return { pct: 0, flat: 0 };
}

function getSkillDmgAtLevel(skill, rarity, star, level) {
  if (CURVES && skill.entity_values) {
    const ev = skill.entity_values;
    const rc = RCODE[rarity] || 'SSR';
    const rankNo = parseInt(CURVES.rank_table[rc]?.[String(star)] || CURVES.rank_table[rc]?.['0'] || 6);
    const cs = skill.curve_source || 'skill';
    const bucket = cs === 'status' ? 'status_curves' : 'rank_curves';
    const rr = CURVES[bucket]?.[String(skill.rank_prop_id)]?.[String(rankNo)] || {};
    const subrank = CURVES.rarity_meta[rc]?.subrank || '';
    const cid = CURVES.group_level_map?.[String(skill.group_level_prop_id)]?.[subrank];
    let lr = {};
    if (cid) {
      for (const bk of ['fixed_curves', 'all_fixed_curves']) {
        const b = CURVES[bk]?.[String(cid)];
        if (!b) continue;
        const lvs = Object.keys(b).map(Number).sort((a, b) => a - b);
        let sel = lvs[0] || 0;
        for (const l of lvs) if (l <= level) sel = l;
        lr = b[String(sel)] || {};
        break;
      }
    }
    for (const f of ['SkillAttack1','SkillAttack2','SkillAttack3','SkillAttack4']) {
      const paired = FPAIR[f];
      if (ev[f] != null) {
        const pb = Number(ev[f]), ps = Number(rr[f] || 0);
        const pct = pb && ps ? (pb * ps) / 1e6 : 0;
        const fb = Number(ev[paired] || 0), fr = Number(rr[paired] || 0), fl = Number(lr[paired] || 0);
        const flat = fl && fb && fr ? (fl * fb * fr) / 1e8 : 0;
        if (pct || flat) return { pct: Math.round(pct * 10) / 10, flat: Math.round(flat) };
      }
    }
  }
  return getSkillDmg(skill, rarity);
}

function getMaxStar(rarity) {
  if (!CURVES || !CURVES.rarity_meta) return 3;
  const rc = RCODE[rarity] || 'SSR';
  return parseInt(CURVES.rarity_meta[rc]?.max_star || 3);
}

// ---- Buff/charm value helper ----
function getCharmValue(skill, rarity) {
  if (skill.extra_entity_stats) {
    for (const ex of skill.extra_entity_stats) {
      const est = ex.stats && ex.stats[rarity]; if (!est) continue;
      for (const [k, v] of Object.entries(est)) {
        if (typeof v === 'object' && (v.pct || v.flat)) return { key: k, pct: v.pct || 0, flat: v.flat || 0 };
      }
    }
  }
  if (skill.passive_status_stats) {
    for (const ps of skill.passive_status_stats) {
      const pst = ps.stats && ps.stats[rarity]; if (!pst) continue;
      for (const [k, v] of Object.entries(pst)) {
        if (typeof v === 'object' && (v.pct || v.flat)) return { key: k, pct: v.pct || 0, flat: v.flat || 0 };
      }
    }
  }
  if (skill.passive_factor_stats && skill.passive_factor_stats[rarity]) {
    const pfs = skill.passive_factor_stats[rarity];
    for (const [k, v] of Object.entries(pfs)) {
      if (typeof v === 'object' && (v.pct || v.value)) return { key: k, pct: v.pct || v.value || 0, flat: 0 };
    }
  }
  return null;
}

// ---- Init ----
async function init(){
  try{
    const r=await fetch(`${SB}/rest/v1/skills?select=*&order=name&limit=500`,{headers:{apikey:SK,Authorization:`Bearer ${SK}`}});
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    AS=(await r.json()).filter(s=>s.name);
    SKILL_MAP=Object.fromEntries(AS.map(s=>[s.id,s]));
    document.getElementById("loading-screen").style.display="none";
    document.querySelector(".header").style.display="";
    document.querySelector(".container").style.display="";
    document.getElementById("skill-count").textContent=`Build Calculator \u2022 ${AS.length} skills`;
    renderAll();
    loadCurves();
  }catch(e){
    document.getElementById("loading-screen").innerHTML=`<div><div class="icon">\u26a0\ufe0f</div><div class="err">Failed to load: ${e.message}</div><div class="msg">Check Supabase connection</div></div>`;
  }
}
function renderAll(){rCP();rBP();rSP()}
function rCP(){
  const p=document.getElementById("class-panel");
  let h=`<div class="panel-title">Class ${SC?`<span class="cn" style="color:${CM[SC]?.c}">\u2014 ${SC}</span>`:""}</div>`;
  ["Sword","Staff"].forEach(path=>{
    h+=`<div class="path-label">${path==="Sword"?"WARRIOR PATH":"MAGE PATH"}</div><div class="class-row">`;
    CL.filter(c=>c.p===path).forEach(c=>{
      const a=SC===c.id;
      h+=`<button class="cls-btn${a?" active":""}" style="${a?`color:${c.c};border-color:${c.c};background:${c.c}18`:""}" onclick="SC=SC==='${c.id}'?null:'${c.id}';renderAll()">${c.id}</button>`;
    });
    h+=`</div>`;
  });
  if(SC)h+=`<div class="class-path">Path: ${gc(SC).map(c=>`<span style="color:${CM[c]?.c}">${c}</span>`).join(" \u2192 ")}</div>`;
  p.innerHTML=h;
}
function sType(s){return s.type==="combat"||s.type==="Technique"?"Technique":"Charm"}

// ---- Render a skill card from slot config {id, rarity, star} ----
function mc(slot,type,desc){
  const sk=SKILL_MAP[slot.id];
  if(!sk) return `<div class="skill-info"><div class="skill-name" style="color:#666">Unknown skill</div></div>`;
  const cc=CM[sk.profession||sk.class]?.c||CM[sk.class]?.c||"#888";
  const ec=elemColor(sk.element);
  let meta=`<span class="skill-class" style="background:${cc}18;color:${cc};border:1px solid ${cc}33">${sk.profession||sk.class}</span>`;
  meta+=`<span class="skill-type ${type.toLowerCase()}">${type}</span>`;
  if(sk.element)meta+=`<span class="skill-elem" style="background:${ec}1f;color:${ec};border:1px solid ${ec}40">${sk.element}</span>`;
  if(sk.cooldown!=null&&sk.cooldown>0)meta+=`<span class="skill-cd">CD ${sk.cooldown}</span>`;
  else if(sk.cooldown===0)meta+=`<span class="skill-cd">No CD</span>`;
  return`<div class="skill-icon"><img src="${iu(sk)}" onerror="this.onerror=()=>{this.onerror=null;this.src='${iuf2(sk)}'};this.src='${iuf(sk)}'" alt=""></div>
  <div class="skill-info"><div class="skill-name">${sk.name}</div>
  <div class="skill-meta">${meta}</div>
  ${desc&&sk.description?`<div class="skill-desc">${sk.description}</div>`:""}
  ${desc&&sk.tags&&sk.tags.length?`<div class="skill-tags">${sk.tags.map(t=>`<span class="skill-tag">${t}</span>`).join("")}</div>`:""}</div>`;
}

// Render a picker card directly from a skill object (used in modal)
function mcPicker(sk,type){
  const cc=CM[sk.profession||sk.class]?.c||CM[sk.class]?.c||"#888";
  const ec=elemColor(sk.element);
  let meta=`<span class="skill-class" style="background:${cc}18;color:${cc};border:1px solid ${cc}33">${sk.profession||sk.class}</span>`;
  meta+=`<span class="skill-type ${type.toLowerCase()}">${type}</span>`;
  if(sk.element)meta+=`<span class="skill-elem" style="background:${ec}1f;color:${ec};border:1px solid ${ec}40">${sk.element}</span>`;
  if(sk.cooldown!=null&&sk.cooldown>0)meta+=`<span class="skill-cd">CD ${sk.cooldown}</span>`;
  else if(sk.cooldown===0)meta+=`<span class="skill-cd">No CD</span>`;
  // Show damage at picker rarity
  if(sk.stats_by_rarity&&sk.stats_by_rarity[RARITY]){
    const st=sk.stats_by_rarity[RARITY];
    for(const k of["SkillAttack1","SkillCureByHp","SkillCureByAttack","ShieldByDefence","ShieldByTargetHp","StatusDmgAddPer","StatusDmgReducePer","AttackScale","DefenceScale"]){
      if(st[k]&&typeof st[k]==="object"&&(st[k].pct||st[k].flat)){
        const flat=st[k].flat>=1e3?(st[k].flat/1e3).toFixed(1)+"K":st[k].flat;
        meta+=`<span class="skill-dmg">${st[k].pct}%+${flat} ${RARITY}</span>`;break;
      }
    }
    if(!meta.includes("skill-dmg")){
      if(sk.extra_entity_stats)for(const ex of sk.extra_entity_stats){
        const est=ex.stats&&ex.stats[RARITY];if(!est)continue;
        for(const[k,v]of Object.entries(est)){
          if(typeof v==="object"&&(v.pct||v.flat)){const flat=v.flat>=1e3?(v.flat/1e3).toFixed(1)+"K":v.flat;meta+=`<span class="skill-dmg">${v.pct}%+${flat}</span>`;break;}
        }if(meta.includes("skill-dmg"))break;
      }
    }
  }else if(sk.damage&&sk.damage.length){
    const ridx={Rare:1,Epic:4,Legendary:8,Mythic:14,Divine:22,Immortal:33};
    const v=sk.damage[ridx[RARITY]];
    if(v!=null)meta+=`<span class="skill-dmg">${v}% ${RARITY}</span>`;
  }
  return`<div class="skill-icon"><img src="${iu(sk)}" onerror="this.onerror=()=>{this.onerror=null;this.src='${iuf2(sk)}'};this.src='${iuf(sk)}'" alt=""></div>
  <div class="skill-info"><div class="skill-name">${sk.name}</div>
  <div class="skill-meta">${meta}</div>
  ${sk.description?`<div class="skill-desc">${sk.description}</div>`:""}
  ${sk.tags&&sk.tags.length?`<div class="skill-tags">${sk.tags.map(t=>`<span class="skill-tag">${t}</span>`).join("")}</div>`:""}</div>`;
}

function elemColor(e){
  return {Physical:"#b0a89a",Fire:"#e8703a",Water:"#3aa5e8",Wind:"#5ec98a",Light:"#ecd25a",Dark:"#a06cd0"}[e]||"#888";
}
function fmtFlat(v){return v>=1e3?(v/1e3).toFixed(1)+"K":Math.round(v)}

// ---- Build panel with per-slot rarity/star + level ----
function rBP(){
  const p=document.getElementById("build-panel");
  let h=`<div class="level-row"><label>Skill Level</label><input type="number" min="1" max="400" value="${LVL}" onchange="LVL=parseInt(this.value)||1;rBP();rSP()"><span style="color:var(--tx3);font-size:12px">Used for flat damage scaling via curves</span></div>`;
  [{t:"Techniques",y:"Technique",s:T},{t:"Charms",y:"Charm",s:C_}].forEach(({t,y,s})=>{
    h+=`<div class="slot-section"><div class="slot-header"><span class="panel-title" style="margin:0">${t}</span><span class="slot-count">${s.filter(Boolean).length}/4</span></div><div class="slots">`;
    s.forEach((slot,i)=>{
      if(slot&&slot.id&&SKILL_MAP[slot.id]){
        const sk=SKILL_MAP[slot.id];
        const rarity=slot.rarity||sk.initial_rarity||"Legendary";
        const star=slot.star||0;
        const maxStar=getMaxStar(rarity);
        // Compute damage/value preview at this slot's rarity/star/level
        let dmgHtml="";
        if(y==="Technique"){
          const d=getSkillDmgAtLevel(sk,rarity,star,LVL);
          if(d.pct||d.flat) dmgHtml=`<span class="slot-dmg">${d.pct}% + ${fmtFlat(d.flat)} @ Lv${LVL}</span>`;
        }else{
          const cv=getCharmValue(sk,rarity);
          if(cv){
            const lbl=FIELD_LABELS[cv.key]||cv.key.replace(/([A-Z])/g,' $1').trim();
            dmgHtml=`<span class="slot-dmg">${cv.pct}% ${lbl}</span>`;
          }
        }
        h+=`<div class="skill-card" onclick="openPicker('${y}',${i})">
          ${mc(slot,y,false)}
          <div class="slot-controls" onclick="event.stopPropagation()">
            <button class="remove-btn" style="position:static;margin-bottom:2px" onclick="rm('${y}',${i})">\u00d7</button>
            <select onchange="setSlotProp('${y}',${i},'rarity',this.value)">
              ${RARITIES.map(r=>`<option ${rarity===r?"selected":""} style="color:${RCOL[r]}">${r}</option>`).join("")}
            </select>
            <select onchange="setSlotProp('${y}',${i},'star',parseInt(this.value))">
              ${Array.from({length:maxStar+1},(_,n)=>`<option value="${n}" ${star===n?"selected":""}>${n}\u2605</option>`).join("")}
            </select>
            ${dmgHtml}
          </div>
        </div>`;
      } else {
        h+=`<div class="empty-slot" onclick="openPicker('${y}',${i})"><div class="empty-icon">+</div><span class="empty-label">Add ${y}</span></div>`;
      }
    });
    h+=`</div></div>`;
  });
  p.innerHTML=h;
}

function setSlotProp(type,idx,prop,val){
  const s=type==="Technique"?T:C_;
  if(s[idx]){s[idx][prop]=val;rBP();rSP()}
}

function rSP(){
  const p=document.getElementById("summary-panel");
  const eq=[...T,...C_].filter(Boolean).map(s=>SKILL_MAP[s.id]).filter(Boolean);
  const cls=[...new Set(eq.map(s=>s.profession||s.class))];
  let h=`<div class="panel-title">Build Summary</div><div class="summary-label">CLASSES USED</div><div class="tags-row">`;
  if(cls.length)cls.forEach(c=>{const cc=CM[c]?.c||"#888";h+=`<span class="tag" style="background:${cc}18;color:${cc};border:1px solid ${cc}33">${c}</span>`;});
  else h+=`<span style="font-size:16px;color:#444;font-style:italic">No skills equipped</span>`;
  h+=`</div><div class="summary-label" style="margin-top:12px">EQUIPPED</div>`;
  h+=`<div class="summary-stat">${T.filter(Boolean).length} Techniques \u2022 ${C_.filter(Boolean).length} Charms</div>`;
  // Show total buff contribution from charms
  const charmBuffs=C_.filter(Boolean).map(s=>{
    const sk=SKILL_MAP[s.id];if(!sk)return null;
    const cv=getCharmValue(sk,s.rarity||"Legendary");
    return cv?{name:sk.name,key:cv.key,pct:cv.pct}:null;
  }).filter(Boolean);
  if(charmBuffs.length){
    h+=`<div class="summary-label" style="margin-top:12px">CHARM BUFFS</div>`;
    charmBuffs.forEach(b=>{
      const lbl=FIELD_LABELS[b.key]||b.key.replace(/([A-Z])/g,' $1').trim();
      h+=`<div style="font-size:14px;color:#aaa;padding:2px 0">${b.name}: <span style="color:var(--acc)">${b.pct}%</span> ${lbl}</div>`;
    });
  }
  p.innerHTML=h;
}

// ---- Picker modal ----
function openPicker(type,idx){
  PT=type;PS=idx;PF=SC||"all";
  document.getElementById("modal-title").textContent=`Select ${type}`;
  document.getElementById("modal-search").value="";
  document.getElementById("search-wrapper").classList.remove("open");
  document.getElementById("search-toggle").classList.remove("active");
  rFR();rRR();renderPicker();
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow="hidden";
}
function rRR(){
  let h=`<span class="rarity-label">Preview @</span>`;
  RARITIES.forEach(r=>{
    const a=RARITY===r;
    h+=`<button class="rbtn${a?" active":""}" style="${a?`background:${RCOL[r]};border-color:${RCOL[r]}`:`color:${RCOL[r]}`}" onclick="RARITY='${r}';rRR();renderPicker()">${r}</button>`;
  });
  document.getElementById("rarity-row").innerHTML=h;
}
function toggleSearch(){
  const w=document.getElementById("search-wrapper");
  const b=document.getElementById("search-toggle");
  const open=w.classList.toggle("open");
  b.classList.toggle("active",open);
  if(open){document.getElementById("modal-search").focus()}
  else{document.getElementById("modal-search").value="";renderPicker()}
}
function closePicker(){document.getElementById("modal").classList.remove("open");document.body.style.overflow=""}
function rFR(){
  const cls=[...new Set(AS.filter(s=>sType(s)===PT&&s.name).map(s=>s.profession||s.class))];
  const ord=CL.filter(c=>cls.includes(c.id));
  let h=`<button class="fbtn${PF==="all"?" active":""}" onclick="PF='all';rFR();renderPicker()">All</button>`;
  ord.forEach(c=>{h+=`<button class="fbtn${PF===c.id?" active":""}" style="${PF===c.id?`color:${c.c};border-color:${c.c}`:""}" onclick="PF='${c.id}';rFR();renderPicker()">${c.id}</button>`;});
  document.getElementById("filter-row").innerHTML=h;
}
function renderPicker(){
  const q=document.getElementById("modal-search").value.toLowerCase();
  const eq=new Set([...T,...C_].filter(Boolean).map(s=>s.id));
  let sk=AS.filter(s=>sType(s)===PT&&s.name&&!eq.has(s.id));
  if(PF!=="all")sk=sk.filter(s=>(s.profession||s.class)===PF);
  else if(SC){const ch=gc(SC);sk=sk.filter(s=>ch.includes(s.profession||s.class))}
  if(q)sk=sk.filter(s=>s.name.toLowerCase().includes(q)||(s.description||"").toLowerCase().includes(q));
  const b=document.getElementById("modal-body");
  if(!sk.length){b.innerHTML=`<div class="no-results">No matching skills</div>`;return}
  b.innerHTML=sk.map(s=>`<div class="skill-card" onclick="sel('${s.id}')">${mcPicker(s,sType(s),true)}</div>`).join("");
}

// ---- Slot actions ----
function sel(id){
  const sk=SKILL_MAP[id];if(!sk)return;
  const rarity=sk.initial_rarity||"Legendary";
  const slot={id:id,rarity:rarity,star:0};
  if(PT==="Technique")T[PS]=slot;else C_[PS]=slot;
  closePicker();rBP();rSP();
}
function rm(type,i){if(type==="Technique")T[i]=null;else C_[i]=null;rBP();rSP()}
function clearBuild(){T=[null,null,null,null];C_=[null,null,null,null];LVL=1;rBP();rSP()}

// ---- Copy build as text ----
function copyBuild(){
  const c=SC||"No Class";
  const t=T.filter(Boolean).map(s=>{const sk=SKILL_MAP[s.id];return sk?`  \u2022 ${sk.name} [${s.rarity} ${s.star}\u2605]`:`  \u2022 ${s.id}`}).join("\n");
  const ch=C_.filter(Boolean).map(s=>{const sk=SKILL_MAP[s.id];return sk?`  \u2022 ${sk.name} [${s.rarity} ${s.star}\u2605]`:`  \u2022 ${s.id}`}).join("\n");
  navigator.clipboard?.writeText(`\u2694\ufe0f SxS Build: ${c} (Lv${LVL})\n\nTechniques:\n${t||"  (none)"}\n\nCharms:\n${ch||"  (none)"}`);
}

// ---- Export to Simulator ----
function exportToSim(){
  const build={
    c: SC||"",
    l: LVL,
    t: T.filter(Boolean).map(s=>({i:s.id,r:s.rarity,s:s.star})),
    ch: C_.filter(Boolean).map(s=>({i:s.id,r:s.rarity,s:s.star}))
  };
  const encoded=btoa(JSON.stringify(build));
  const url=`simulator.html?import=${encoded}`;
  // Open in same tab for mobile friendliness
  window.location.href=url;
}

// ---- Event listeners ----
document.getElementById("modal").addEventListener("click",e=>{if(e.target.id==="modal")closePicker()});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closePicker()});
init();
</script>
</body></html>
