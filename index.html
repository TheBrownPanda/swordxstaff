<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sword × Staff Build Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-deep:#080810;--bg-card:#0e0e1c;--bg-card2:#12122a;--bg-hover:rgba(255,255,255,.04);
  --border:rgba(255,255,255,.06);--border-light:rgba(255,255,255,.1);
  --text:#e8e6e3;--text-dim:#999;--text-muted:#555;
  --accent:#ffd54f;--accent2:#ff8a65;
  --technique:#5b8dd9;--charm:#c084fc;
  --warrior:#e05252;--mage:#9b59b6;--sage:#27ae60;
}
html{background:var(--bg-deep);color:var(--text);font-family:'Outfit',system-ui,sans-serif}
body{min-height:100vh;background:linear-gradient(160deg,#080810 0%,#0e0e1c 40%,#0c1428 100%)}

/* Header */
.header{padding:14px 16px;border-bottom:1px solid var(--border);background:rgba(0,0,0,.4);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.header-inner{max-width:680px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.logo{font-size:19px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:10px;color:var(--text-muted);margin-top:1px}
.header-btns{display:flex;gap:5px}
.hbtn{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg-hover);color:var(--text-dim);font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
.hbtn:hover{background:rgba(255,255,255,.08);color:var(--text)}
.hbtn.danger{border-color:rgba(231,76,60,.2);color:#e74c3c}
.hbtn.primary{border-color:rgba(255,213,79,.25);color:var(--accent)}

/* Container */
.container{padding:14px;max-width:680px;margin:0 auto}

/* Panels */
.panel{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px}
.panel-title{font-size:11px;font-weight:700;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.panel-title .cls-name{font-weight:800}

/* Class selector */
.path-label{font-size:9px;color:var(--text-muted);font-weight:700;letter-spacing:1px;margin-bottom:4px}
.class-row{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px}
.cls-btn{padding:3px 9px;border-radius:5px;border:1px solid var(--border);background:var(--bg-hover);color:var(--text-dim);font-size:11px;cursor:pointer;font-family:inherit;transition:.12s;font-weight:400}
.cls-btn:hover{background:rgba(255,255,255,.06)}
.cls-btn.active{font-weight:700}
.class-path{font-size:9px;color:var(--text-muted);margin-top:4px}
.class-path span{transition:.15s}

/* Slots */
.slot-section{margin-bottom:14px}
.slot-section:last-child{margin-bottom:0}
.slot-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.slot-count{font-size:9px;color:var(--text-muted)}
.slots{display:flex;flex-direction:column;gap:5px}

/* Skill card */
.skill-card{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:9px;border:1px solid var(--border);background:var(--bg-card2);cursor:pointer;transition:.12s;position:relative}
.skill-card:hover{border-color:var(--border-light);background:rgba(255,255,255,.03)}
.skill-card.selected{border-color:var(--accent);box-shadow:0 0 8px rgba(255,213,79,.08)}
.skill-icon{width:38px;height:38px;border-radius:7px;overflow:hidden;flex-shrink:0;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)}
.skill-icon img{width:100%;height:100%;object-fit:cover;display:block}
.skill-info{flex:1;min-width:0}
.skill-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.skill-meta{display:flex;align-items:center;gap:5px;margin-top:1px}
.skill-class{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700}
.skill-type{font-size:10px}
.skill-type.technique{color:var(--technique)}
.skill-type.charm{color:var(--charm)}
.skill-desc{font-size:10px;color:#777;margin-top:3px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.remove-btn{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:9px;background:rgba(200,50,50,.75);border:none;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:.15s}
.skill-card:hover .remove-btn{opacity:1}

/* Empty slot */
.empty-slot{border:1.5px dashed rgba(255,255,255,.07);border-radius:9px;padding:8px 10px;cursor:pointer;display:flex;align-items:center;gap:8px;min-height:48px;background:rgba(255,255,255,.01);transition:.15s}
.empty-slot:hover{border-color:rgba(255,255,255,.12);background:rgba(255,255,255,.02)}
.empty-icon{width:36px;height:36px;border-radius:7px;background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center;font-size:16px;color:#333}
.empty-label{font-size:11px;color:#444}

/* Build summary */
.tags-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.tag{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600}
.summary-label{font-size:10px;color:var(--text-muted);margin-bottom:5px}
.summary-stat{font-size:11px;color:#aaa}

/* Modal */
.modal-overlay{position:fixed;inset:0;z-index:1000;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.75);backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:linear-gradient(180deg,#141428,#0c1428);border:1px solid rgba(255,255,255,.08);border-radius:14px;width:92%;max-width:540px;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal-header{padding:14px 16px;border-bottom:1px solid var(--border)}
.modal-header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.modal-title{font-size:15px;font-weight:700}
.modal-close{background:none;border:none;color:#666;font-size:20px;cursor:pointer;font-family:inherit}
.modal-search{width:100%;padding:7px 11px;border-radius:7px;border:1px solid var(--border);background:rgba(0,0,0,.3);color:var(--text);font-size:12px;outline:none;font-family:inherit;box-sizing:border-box}
.modal-search:focus{border-color:var(--technique)}
.filter-row{display:flex;gap:3px;flex-wrap:wrap;margin-top:7px}
.fbtn{padding:2px 7px;border-radius:4px;font-size:9px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid var(--border);background:var(--bg-hover);color:var(--text-muted);transition:.12s}
.fbtn:hover{background:rgba(255,255,255,.06)}
.fbtn.active{color:var(--text);background:rgba(255,255,255,.1);border-color:var(--border-light)}
.modal-body{flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column;gap:5px}
.no-results{text-align:center;color:var(--text-muted);padding:30px;font-size:12px}

/* Loading */
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center}
.loading-screen .icon{font-size:28px;margin-bottom:8px}
.loading-screen .msg{color:var(--text-muted);font-size:13px}
.loading-screen .err{color:#e74c3c;font-size:13px;margin-bottom:6px}

/* Footer */
.footer{text-align:center;padding:16px 0;font-size:9px;color:#1a1a2a}

/* Responsive */
@media(max-width:480px){
  .skill-card{padding:6px 7px;gap:6px}
  .skill-icon{width:34px;height:34px}
  .skill-name{font-size:11px}
  .modal{width:96%;max-height:88vh}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <div class="logo">⚔️ Sword × Staff</div>
      <div class="logo-sub">Build Calculator</div>
    </div>
    <div class="header-btns">
      <button class="hbtn danger" onclick="clearBuild()">Clear</button>
      <button class="hbtn primary" onclick="copyBuild()">📋 Copy</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="panel" id="class-panel"></div>
  <div class="panel" id="build-panel"></div>
  <div class="panel" id="summary-panel"></div>
  <div class="footer">Sword × Staff Build Calculator • Data from lootandwaifus.com • Not affiliated with BOLTRAY</div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-header-row">
        <span class="modal-title" id="modal-title">Select Skill</span>
        <button class="modal-close" onclick="closePicker()">✕</button>
      </div>
      <input class="modal-search" id="modal-search" placeholder="Search skills..." oninput="renderPicker()">
      <div class="filter-row" id="filter-row"></div>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div class="loading-screen" id="loading-screen">
  <div>
    <div class="icon">⚔️</div>
    <div class="msg">Loading skill database...</div>
  </div>
</div>

<script>
// ── Config ──
const SB_URL = "https://ysxbglavmdngayvinrzk.supabase.co";
const SB_KEY = "sb_publishable_w9keP2-21tJKR6FcF0YIQA_6q3ykBk-";
const ICON_BASE = `${SB_URL}/storage/v1/object/public/skill-icons`;
const LW_ICON = "https://lootandwaifus.com/skills/swordxstaff";

const CLASSES = [
  {id:"Warrior",path:"Sword",promo:1,color:"#e05252",icon:"⚔️"},
  {id:"Knight",path:"Sword",promo:2,color:"#5b8dd9",icon:"🛡️",parent:"Warrior"},
  {id:"Duelist",path:"Sword",promo:2,color:"#e8943a",icon:"🗡️",parent:"Warrior"},
  {id:"Paladin",path:"Sword",promo:3,color:"#4a7bc8",icon:"🏰",parent:"Knight"},
  {id:"Berserker",path:"Sword",promo:3,color:"#cc4422",icon:"👹",parent:"Duelist"},
  {id:"Guardian",path:"Sword",promo:4,color:"#3a6ab5",icon:"🗿",parent:"Paladin"},
  {id:"Conqueror",path:"Sword",promo:4,color:"#b33318",icon:"👑",parent:"Berserker"},
  {id:"Templar",path:"Sword",promo:5,color:"#2d5a9e",icon:"✝️",parent:"Guardian"},
  {id:"Ravager",path:"Sword",promo:5,color:"#992210",icon:"🔥",parent:"Conqueror"},
  {id:"Mage",path:"Staff",promo:1,color:"#9b59b6",icon:"🪄"},
  {id:"Sorcerer",path:"Staff",promo:2,color:"#8e44ad",icon:"🔮",parent:"Mage"},
  {id:"Sage",path:"Staff",promo:2,color:"#27ae60",icon:"📖",parent:"Mage"},
  {id:"Archmage",path:"Staff",promo:3,color:"#7d3c98",icon:"💫",parent:"Sorcerer"},
  {id:"Arcanist",path:"Staff",promo:3,color:"#1e8449",icon:"🌟",parent:"Sage"},
  {id:"Destroyer",path:"Staff",promo:4,color:"#6c3483",icon:"💀",parent:"Archmage"},
  {id:"Dominator",path:"Staff",promo:4,color:"#196f3d",icon:"🌙",parent:"Arcanist"},
  {id:"Magister",path:"Staff",promo:5,color:"#5b2c6f",icon:"⚡",parent:"Destroyer"},
  {id:"Prophet",path:"Staff",promo:5,color:"#145a32",icon:"🕊️",parent:"Dominator"},
];
const CM = Object.fromEntries(CLASSES.map(c=>[c.id,c]));

function getChain(cls){const ch=[cls];let c=cls;while(CM[c]?.parent){c=CM[c].parent;ch.unshift(c)}return ch}

function iconUrl(skill){
  const id = skill.id || skill.i;
  const numId = typeof id === "string" ? id.replace("skill_","") : id;
  return `${ICON_BASE}/sprite_skill_${numId}.png`;
}
function iconFallback(skill){
  const id = skill.id || skill.i;
  const numId = typeof id === "string" ? id.replace("skill_","") : id;
  return `${LW_ICON}/skill_${numId}.webp`;
}

// ── State ──
let allSkills = [];
let selectedClass = null;
let techniques = [null,null,null,null];
let charms = [null,null,null,null];
let pickerType = "Technique";
let pickerSlot = 0;
let pickerClassFilter = "all";

// ── Fetch from Supabase ──
async function loadSkills(){
  try {
    const res = await fetch(`${SB_URL}/rest/v1/skills?select=*&order=name&limit=500`, {
      headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` }
    });
    if(!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
    allSkills = (await res.json()).filter(s => s.name);
    document.getElementById("loading-screen").style.display = "none";
    document.querySelector(".header").style.display = "";
    document.querySelector(".container").style.display = "";
    renderAll();
  } catch(e) {
    const ls = document.getElementById("loading-screen");
    ls.innerHTML = `<div><div class="icon">⚠️</div><div class="err">Failed to load: ${e.message}</div><div class="msg">Check Supabase connection and RLS policies</div></div>`;
  }
}

// ── Render ──
function renderAll(){ renderClassPanel(); renderBuildPanel(); renderSummary(); }

function renderClassPanel(){
  const p = document.getElementById("class-panel");
  let h = `<div class="panel-title">Class ${selectedClass ? `<span class="cls-name" style="color:${CM[selectedClass]?.color}">— ${selectedClass}</span>` : ""}</div>`;
  ["Sword","Staff"].forEach(path => {
    h += `<div class="path-label">${path === "Sword" ? "WARRIOR PATH" : "MAGE PATH"}</div><div class="class-row">`;
    CLASSES.filter(c=>c.path===path).forEach(c => {
      const active = selectedClass === c.id;
      h += `<button class="cls-btn ${active?"active":""}" style="${active?`color:${c.color};border-color:${c.color};background:${c.color}18`:""}" onclick="toggleClass('${c.id}')">${c.icon} ${c.id}</button>`;
    });
    h += `</div>`;
  });
  if(selectedClass){
    h += `<div class="class-path">Path: ${getChain(selectedClass).map(c=>`<span style="color:${CM[c]?.color}">${c}</span>`).join(" → ")}</div>`;
  }
  p.innerHTML = h;
}

function renderBuildPanel(){
  const p = document.getElementById("build-panel");
  let h = "";
  [{title:"Techniques",type:"Technique",slots:techniques},{title:"Charms",type:"Charm",slots:charms}].forEach(({title,type,slots},si) => {
    h += `<div class="slot-section"><div class="slot-header"><span class="panel-title" style="margin:0">${title}</span><span class="slot-count">${slots.filter(Boolean).length}/4</span></div><div class="slots">`;
    slots.forEach((sk,i) => {
      if(sk){
        const ci = CM[sk.class];
        h += `<div class="skill-card" onclick="openPicker('${type}',${i})">
          <div class="skill-icon"><img src="${iconUrl(sk)}" onerror="this.src='${iconFallback(sk)}'" alt=""></div>
          <div class="skill-info">
            <div class="skill-name">${sk.name}</div>
            <div class="skill-meta">
              <span class="skill-class" style="background:${ci?.color||"#888"}18;color:${ci?.color||"#888"};border:1px solid ${ci?.color||"#888"}33">${sk.class}</span>
              <span class="skill-type ${type.toLowerCase()}">${type}</span>
            </div>
          </div>
          <button class="remove-btn" onclick="event.stopPropagation();removeSkill('${type}',${i})">×</button>
        </div>`;
      } else {
        h += `<div class="empty-slot" onclick="openPicker('${type}',${i})"><div class="empty-icon">+</div><span class="empty-label">Add ${type}</span></div>`;
      }
    });
    h += `</div></div>`;
  });
  p.innerHTML = h;
}

function renderSummary(){
  const p = document.getElementById("summary-panel");
  const equipped = [...techniques,...charms].filter(Boolean);
  const classes = [...new Set(equipped.map(s=>s.class))];
  let h = `<div class="panel-title">Build Summary</div>`;
  h += `<div class="summary-label">CLASSES USED</div><div class="tags-row">`;
  if(classes.length){
    classes.forEach(c => { h += `<span class="tag" style="background:${CM[c]?.color||"#888"}18;color:${CM[c]?.color||"#888"};border:1px solid ${CM[c]?.color||"#888"}33">${c}</span>`; });
  } else { h += `<span style="font-size:10px;color:#444;font-style:italic">No skills equipped</span>`; }
  h += `</div>`;
  h += `<div class="summary-label" style="margin-top:8px">EQUIPPED</div>`;
  h += `<div class="summary-stat">${techniques.filter(Boolean).length} Techniques • ${charms.filter(Boolean).length} Charms</div>`;
  p.innerHTML = h;
}

// ── Picker ──
function openPicker(type, idx){
  pickerType = type; pickerSlot = idx; pickerClassFilter = "all";
  document.getElementById("modal-title").textContent = `Select ${type}`;
  document.getElementById("modal-search").value = "";
  renderFilterRow();
  renderPicker();
  document.getElementById("modal").classList.add("open");
  setTimeout(() => document.getElementById("modal-search").focus(), 100);
}
function closePicker(){ document.getElementById("modal").classList.remove("open"); }

function renderFilterRow(){
  const classes = [...new Set(allSkills.filter(s=>s.type===pickerType&&s.name).map(s=>s.class))];
  const ordered = CLASSES.filter(c=>classes.includes(c.id));
  let h = `<button class="fbtn ${pickerClassFilter==="all"?"active":""}" onclick="setClassFilter('all')">All</button>`;
  ordered.forEach(c => {
    h += `<button class="fbtn ${pickerClassFilter===c.id?"active":""}" style="${pickerClassFilter===c.id?`color:${c.color};border-color:${c.color}`:""}" onclick="setClassFilter('${c.id}')">${c.id}</button>`;
  });
  document.getElementById("filter-row").innerHTML = h;
}

function setClassFilter(f){ pickerClassFilter = f; renderFilterRow(); renderPicker(); }

function renderPicker(){
  const q = document.getElementById("modal-search").value.toLowerCase();
  const eqIds = new Set([...techniques,...charms].filter(Boolean).map(s=>s.id));
  let sk = allSkills.filter(s => s.type === pickerType && s.name && !eqIds.has(s.id));
  if(pickerClassFilter !== "all") sk = sk.filter(s => s.class === pickerClassFilter);
  else if(selectedClass){ const chain = getChain(selectedClass); sk = sk.filter(s => chain.includes(s.class)); }
  if(q) sk = sk.filter(s => s.name.toLowerCase().includes(q) || (s.description||"").toLowerCase().includes(q));

  const body = document.getElementById("modal-body");
  if(!sk.length){ body.innerHTML = `<div class="no-results">No matching skills</div>`; return; }
  body.innerHTML = sk.map(s => {
    const ci = CM[s.class];
    return `<div class="skill-card" onclick="selectSkill('${s.id}')">
      <div class="skill-icon"><img src="${iconUrl(s)}" onerror="this.src='${iconFallback(s)}'" alt=""></div>
      <div class="skill-info">
        <div class="skill-name">${s.name}</div>
        <div class="skill-meta">
          <span class="skill-class" style="background:${ci?.color||"#888"}18;color:${ci?.color||"#888"};border:1px solid ${ci?.color||"#888"}33">${s.class}</span>
          <span class="skill-type ${s.type.toLowerCase()}">${s.type}</span>
        </div>
        ${s.description ? `<div class="skill-desc">${s.description}</div>` : ""}
      </div>
    </div>`;
  }).join("");
}

function selectSkill(id){
  const sk = allSkills.find(s=>s.id===id);
  if(!sk) return;
  if(pickerType==="Technique") techniques[pickerSlot]=sk; else charms[pickerSlot]=sk;
  closePicker();
  renderBuildPanel();
  renderSummary();
}

// ── Actions ──
function toggleClass(id){ selectedClass = selectedClass===id ? null : id; renderAll(); }
function removeSkill(type,idx){
  if(type==="Technique") techniques[idx]=null; else charms[idx]=null;
  renderBuildPanel(); renderSummary();
}
function clearBuild(){ techniques=[null,null,null,null]; charms=[null,null,null,null]; renderBuildPanel(); renderSummary(); }
function copyBuild(){
  const cls = selectedClass || "No Class";
  const t = techniques.filter(Boolean).map(s=>`  • ${s.name} (${s.class})`).join("\n");
  const c = charms.filter(Boolean).map(s=>`  • ${s.name} (${s.class})`).join("\n");
  navigator.clipboard?.writeText(`⚔️ SxS Build: ${cls}\n\nTechniques:\n${t||"  (none)"}\n\nCharms:\n${c||"  (none)"}`);
}

// Close modal on backdrop click / Escape
document.getElementById("modal").addEventListener("click", e => { if(e.target.id==="modal") closePicker(); });
document.addEventListener("keydown", e => { if(e.key==="Escape") closePicker(); });

// Hide main content until loaded
document.querySelector(".header").style.display = "none";
document.querySelector(".container").style.display = "none";

// Go
loadSkills();
</script>
</body>
</html>
