<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sword × Staff Build Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;--card:#0e0e1c;--card2:#12122a;--bdr:rgba(255,255,255,.06);--bdr2:rgba(255,255,255,.12);
  --tx:#e8e6e3;--tx2:#aaa;--tx3:#666;--acc:#ffd54f;--acc2:#ff8a65;
  --tech:#5b8dd9;--chrm:#c084fc;
}
html{background:var(--bg);color:var(--tx);font-family:'Outfit',system-ui,sans-serif;-webkit-tap-highlight-color:transparent}
body{min-height:100vh;min-height:100dvh;background:linear-gradient(160deg,#080810,#0e0e1c 40%,#0c1428)}

.header{padding:20px 24px;border-bottom:1px solid var(--bdr);background:rgba(0,0,0,.5);backdrop-filter:blur(14px);position:sticky;top:0;z-index:100}
.header-inner{max-width:800px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:15px;color:var(--tx3);margin-top:2px}
.header-btns{display:flex;gap:10px}
.hbtn{padding:14px 22px;border-radius:10px;border:1px solid var(--bdr);background:rgba(255,255,255,.04);color:var(--tx2);font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;min-height:50px;display:flex;align-items:center;gap:6px}
.hbtn:active{transform:scale(.97)}
.hbtn.danger{border-color:rgba(231,76,60,.3);color:#e74c3c}
.hbtn.primary{border-color:rgba(255,213,79,.35);color:var(--acc)}

.container{padding:20px;max-width:800px;margin:0 auto}
.panel{background:var(--card);border:1px solid var(--bdr);border-radius:18px;padding:22px;margin-bottom:20px}
.panel-title{font-size:17px;font-weight:700;color:var(--tx2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px}
.panel-title .cn{font-weight:800}

.path-label{font-size:13px;color:var(--tx3);font-weight:700;letter-spacing:1.5px;margin-bottom:8px;margin-top:6px}
.class-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.cls-btn{padding:10px 16px;border-radius:10px;border:1px solid var(--bdr);background:rgba(255,255,255,.03);color:var(--tx2);font-size:16px;cursor:pointer;font-family:inherit;transition:.15s;font-weight:500;min-height:46px}
.cls-btn:active{transform:scale(.96)}
.cls-btn.active{font-weight:700}
.class-path{font-size:14px;color:var(--tx3);margin-top:6px;line-height:1.6}

.slot-section{margin-bottom:20px}
.slot-section:last-child{margin-bottom:0}
.slot-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.slot-count{font-size:15px;color:var(--tx3)}
.slots{display:flex;flex-direction:column;gap:10px}

.skill-card{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:14px;border:1px solid var(--bdr);background:var(--card2);cursor:pointer;transition:.12s;position:relative;min-height:80px}
.skill-card:active{transform:scale(.99);background:rgba(255,255,255,.03)}
.modal-body .skill-card{align-items:flex-start}
.skill-icon{width:56px;height:56px;border-radius:12px;overflow:hidden;flex-shrink:0;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)}
.skill-icon img{width:100%;height:100%;object-fit:cover;display:block}
.skill-info{flex:1;min-width:0}
.skill-name{font-size:18px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.skill-meta{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap}
.skill-class{font-size:12px;padding:3px 9px;border-radius:5px;font-weight:700}
.skill-type{font-size:15px;font-weight:500}
.skill-type.technique{color:var(--tech)}
.skill-type.charm{color:var(--chrm)}
.skill-desc{font-size:14px;color:#888;margin-top:6px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.remove-btn{position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:16px;background:rgba(200,50,50,.85);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
@media(hover:hover){.remove-btn{opacity:0;transition:.15s}.skill-card:hover .remove-btn{opacity:1}}

.empty-slot{border:2px dashed rgba(255,255,255,.08);border-radius:14px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:14px;min-height:80px;background:rgba(255,255,255,.01);transition:.15s}
.empty-slot:active{border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.03)}
.empty-icon{width:56px;height:56px;border-radius:12px;background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center;font-size:26px;color:#333;flex-shrink:0}
.empty-label{font-size:17px;color:#444}

.tags-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.tag{font-size:15px;padding:6px 12px;border-radius:7px;font-weight:600}
.summary-label{font-size:14px;color:var(--tx3);margin-bottom:8px;font-weight:600;letter-spacing:.5px}
.summary-stat{font-size:18px;color:#bbb}

.modal-overlay{position:fixed;inset:0;z-index:1000;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:linear-gradient(180deg,#141428,#0c1428);border:1px solid rgba(255,255,255,.1);border-radius:22px 22px 0 0;width:100%;max-width:640px;max-height:92vh;max-height:92dvh;display:flex;flex-direction:column;box-shadow:0 -10px 40px rgba(0,0,0,.5);padding-bottom:env(safe-area-inset-bottom,0)}
.modal-handle{width:44px;height:5px;border-radius:3px;background:rgba(255,255,255,.15);margin:12px auto 8px}
.modal-header{padding:8px 24px 16px}
.modal-header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-title{font-size:24px;font-weight:700}
.modal-close{background:none;border:none;color:#888;font-size:32px;cursor:pointer;font-family:inherit;padding:6px 10px;min-height:50px;min-width:50px;display:flex;align-items:center;justify-content:center}
.modal-search{width:100%;padding:14px 18px;border-radius:12px;border:1px solid var(--bdr);background:rgba(0,0,0,.3);color:var(--tx);font-size:18px;outline:none;font-family:inherit}
.modal-search:focus{border-color:var(--tech)}
.filter-row{display:flex;gap:7px;flex-wrap:nowrap;margin-top:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.fbtn{padding:8px 14px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid var(--bdr);background:rgba(255,255,255,.03);color:var(--tx3);white-space:nowrap;min-height:40px}
.fbtn:active{transform:scale(.96)}
.fbtn.active{color:var(--tx);background:rgba(255,255,255,.1);border-color:var(--bdr2)}
.modal-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 20px 40px;display:flex;flex-direction:column;gap:12px}
.no-results{text-align:center;color:var(--tx3);padding:50px;font-size:17px}

.loading-screen{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;text-align:center}
.loading-screen .icon{font-size:42px;margin-bottom:12px}
.loading-screen .msg{color:var(--tx3);font-size:17px}
.loading-screen .err{color:#e74c3c;font-size:17px;margin-bottom:10px}
.footer{text-align:center;padding:28px 0;font-size:12px;color:#222}

@media(min-width:640px){
  .modal{border-radius:22px;max-height:82vh;margin-bottom:4vh}
  .modal-overlay{align-items:center}
  .modal-handle{display:none}
  .skill-icon{width:64px;height:64px}
  .skill-card{min-height:88px;gap:16px;padding:16px 18px}
  .skill-name{font-size:20px}
  .skill-desc{font-size:15px}
  .empty-slot{min-height:88px}
  .empty-icon{width:64px;height:64px;font-size:28px}
  .empty-label{font-size:18px}
}
@media(max-width:639px){
  .modal-body .skill-card{padding:12px;gap:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02)}
  .modal-body .skill-desc{-webkit-line-clamp:2;font-size:13px;margin-top:4px}
  .modal-body .skill-icon{width:52px;height:52px}
  .modal-body .skill-name{font-size:16px}
  .modal-body .skill-meta{margin-top:2px}
  .modal-header{padding:8px 18px 14px}
  .modal-body{padding:8px 14px 40px;gap:10px}
}
@media(max-width:380px){
  .header{padding:14px 16px}
  .logo{font-size:22px}
  .container{padding:14px}
  .panel{padding:16px}
  .cls-btn{padding:8px 12px;font-size:14px}
}
</style>
</head>
<body>
<div class="header" style="display:none">
  <div class="header-inner">
    <div><div class="logo">⚔️ Sword × Staff</div><div class="logo-sub" id="skill-count">Build Calculator</div></div>
    <div class="header-btns">
      <button class="hbtn danger" onclick="clearBuild()">Clear</button>
      <button class="hbtn primary" onclick="copyBuild()">📋 Copy</button>
    </div>
  </div>
</div>
<div class="container" style="display:none">
  <div class="panel" id="class-panel"></div>
  <div class="panel" id="build-panel"></div>
  <div class="panel" id="summary-panel"></div>
  <div class="footer">Sword × Staff Build Calculator</div>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-header-row">
        <span class="modal-title" id="modal-title">Select Skill</span>
        <button class="modal-close" onclick="closePicker()">✕</button>
      </div>
      <input class="modal-search" id="modal-search" placeholder="Search skills..." oninput="renderPicker()" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <div class="filter-row" id="filter-row"></div>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>
<div class="loading-screen" id="loading-screen"><div><div class="icon">⚔️</div><div class="msg">Loading skill database...</div></div></div>

<script>
const SB="https://ysxbglavmdngayvinrzk.supabase.co",SK="sb_publishable_w9keP2-21tJKR6FcF0YIQA_6q3ykBk-";
const IB=`${SB}/storage/v1/object/public/skill-icons`,LW="https://lootandwaifus.com/skills/swordxstaff";
const CL=[
  {id:"Warrior",p:"Sword",c:"#e05252"},
  {id:"Knight",p:"Sword",c:"#5b8dd9",pa:"Warrior"},
  {id:"Duelist",p:"Sword",c:"#e8943a",pa:"Warrior"},
  {id:"Paladin",p:"Sword",c:"#4a7bc8",pa:"Knight"},
  {id:"Berserker",p:"Sword",c:"#cc4422",pa:"Duelist"},
  {id:"Guardian",p:"Sword",c:"#3a6ab5",pa:"Paladin"},
  {id:"Conqueror",p:"Sword",c:"#b33318",pa:"Berserker"},
  {id:"Templar",p:"Sword",c:"#2d5a9e",pa:"Guardian"},
  {id:"Ravager",p:"Sword",c:"#992210",pa:"Conqueror"},
  {id:"Mage",p:"Staff",c:"#9b59b6"},
  {id:"Sorcerer",p:"Staff",c:"#8e44ad",pa:"Mage"},
  {id:"Sage",p:"Staff",c:"#27ae60",pa:"Mage"},
  {id:"Archmage",p:"Staff",c:"#7d3c98",pa:"Sorcerer"},
  {id:"Arcanist",p:"Staff",c:"#1e8449",pa:"Sage"},
  {id:"Destroyer",p:"Staff",c:"#6c3483",pa:"Archmage"},
  {id:"Dominator",p:"Staff",c:"#196f3d",pa:"Arcanist"},
  {id:"Magister",p:"Staff",c:"#5b2c6f",pa:"Destroyer"},
  {id:"Prophet",p:"Staff",c:"#145a32",pa:"Dominator"},
];
const CM=Object.fromEntries(CL.map(c=>[c.id,c]));
function gc(s){const r=[s];let x=s;while(CM[x]?.pa){x=CM[x].pa;r.unshift(x)}return r}
function iu(s){const n=typeof s.id==="string"?s.id.replace("skill_",""):s.id;return`${IB}/sprite_skill_${n}.png`}
function iuf(s){const n=typeof s.id==="string"?s.id.replace("skill_",""):s.id;return`${LW}/skill_${n}.webp`}

let AS=[],SC=null,T=[null,null,null,null],C_=[null,null,null,null],PT="Technique",PS=0,PF="all";

async function init(){
  try{
    const r=await fetch(`${SB}/rest/v1/skills?select=*&order=name&limit=500`,{headers:{apikey:SK,Authorization:`Bearer ${SK}`}});
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    AS=(await r.json()).filter(s=>s.name);
    document.getElementById("loading-screen").style.display="none";
    document.querySelector(".header").style.display="";
    document.querySelector(".container").style.display="";
    document.getElementById("skill-count").textContent=`Build Calculator \u2022 ${AS.length} skills`;
    renderAll();
  }catch(e){
    document.getElementById("loading-screen").innerHTML=`<div><div class="icon">\u26a0\ufe0f</div><div class="err">Failed to load: ${e.message}</div><div class="msg">Check Supabase connection</div></div>`;
  }
}
function renderAll(){rCP();rBP();rSP()}
function rCP(){
  const p=document.getElementById("class-panel");
  let h=`<div class="panel-title">Class ${SC?`<span class="cn" style="color:${CM[SC]?.c}">\u2014 ${SC}</span>`:""}</div>`;
  ["Sword","Staff"].forEach(path=>{
    h+=`<div class="path-label">${path==="Sword"?"WARRIOR PATH":"MAGE PATH"}</div><div class="class-row">`;
    CL.filter(c=>c.p===path).forEach(c=>{
      const a=SC===c.id;
      h+=`<button class="cls-btn${a?" active":""}" style="${a?`color:${c.c};border-color:${c.c};background:${c.c}18`:""}" onclick="SC=SC==='${c.id}'?null:'${c.id}';renderAll()">${c.id}</button>`;
    });
    h+=`</div>`;
  });
  if(SC)h+=`<div class="class-path">Path: ${gc(SC).map(c=>`<span style="color:${CM[c]?.c}">${c}</span>`).join(" \u2192 ")}</div>`;
  p.innerHTML=h;
}
function mc(sk,type,desc){
  const cc=CM[sk.class]?.c||"#888";
  return`<div class="skill-icon"><img src="${iu(sk)}" onerror="this.onerror=null;this.src='${iuf(sk)}'" alt=""></div>
  <div class="skill-info"><div class="skill-name">${sk.name}</div>
  <div class="skill-meta"><span class="skill-class" style="background:${cc}18;color:${cc};border:1px solid ${cc}33">${sk.class}</span>
  <span class="skill-type ${type.toLowerCase()}">${type}</span></div>
  ${desc&&sk.description?`<div class="skill-desc">${sk.description}</div>`:""}</div>`;
}
function rBP(){
  const p=document.getElementById("build-panel");let h="";
  [{t:"Techniques",y:"Technique",s:T},{t:"Charms",y:"Charm",s:C_}].forEach(({t,y,s})=>{
    h+=`<div class="slot-section"><div class="slot-header"><span class="panel-title" style="margin:0">${t}</span><span class="slot-count">${s.filter(Boolean).length}/4</span></div><div class="slots">`;
    s.forEach((sk,i)=>{
      if(sk) h+=`<div class="skill-card" onclick="openPicker('${y}',${i})">${mc(sk,y,false)}<button class="remove-btn" onclick="event.stopPropagation();rm('${y}',${i})">\u00d7</button></div>`;
      else h+=`<div class="empty-slot" onclick="openPicker('${y}',${i})"><div class="empty-icon">+</div><span class="empty-label">Add ${y}</span></div>`;
    });
    h+=`</div></div>`;
  });
  p.innerHTML=h;
}
function rSP(){
  const p=document.getElementById("summary-panel");
  const eq=[...T,...C_].filter(Boolean);
  const cls=[...new Set(eq.map(s=>s.class))];
  let h=`<div class="panel-title">Build Summary</div><div class="summary-label">CLASSES USED</div><div class="tags-row">`;
  if(cls.length)cls.forEach(c=>{const cc=CM[c]?.c||"#888";h+=`<span class="tag" style="background:${cc}18;color:${cc};border:1px solid ${cc}33">${c}</span>`;});
  else h+=`<span style="font-size:16px;color:#444;font-style:italic">No skills equipped</span>`;
  h+=`</div><div class="summary-label" style="margin-top:12px">EQUIPPED</div>`;
  h+=`<div class="summary-stat">${T.filter(Boolean).length} Techniques \u2022 ${C_.filter(Boolean).length} Charms</div>`;
  p.innerHTML=h;
}
function openPicker(type,idx){
  PT=type;PS=idx;PF="all";
  document.getElementById("modal-title").textContent=`Select ${type}`;
  document.getElementById("modal-search").value="";
  rFR();renderPicker();
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow="hidden";
  setTimeout(()=>document.getElementById("modal-search").focus(),150);
}
function closePicker(){document.getElementById("modal").classList.remove("open");document.body.style.overflow=""}
function rFR(){
  const cls=[...new Set(AS.filter(s=>s.type===PT&&s.name).map(s=>s.class))];
  const ord=CL.filter(c=>cls.includes(c.id));
  let h=`<button class="fbtn${PF==="all"?" active":""}" onclick="PF='all';rFR();renderPicker()">All</button>`;
  ord.forEach(c=>{h+=`<button class="fbtn${PF===c.id?" active":""}" style="${PF===c.id?`color:${c.c};border-color:${c.c}`:""}" onclick="PF='${c.id}';rFR();renderPicker()">${c.id}</button>`;});
  document.getElementById("filter-row").innerHTML=h;
}
function renderPicker(){
  const q=document.getElementById("modal-search").value.toLowerCase();
  const eq=new Set([...T,...C_].filter(Boolean).map(s=>s.id));
  let sk=AS.filter(s=>s.type===PT&&s.name&&!eq.has(s.id));
  if(PF!=="all")sk=sk.filter(s=>s.class===PF);
  else if(SC){const ch=gc(SC);sk=sk.filter(s=>ch.includes(s.class))}
  if(q)sk=sk.filter(s=>s.name.toLowerCase().includes(q)||(s.description||"").toLowerCase().includes(q));
  const b=document.getElementById("modal-body");
  if(!sk.length){b.innerHTML=`<div class="no-results">No matching skills</div>`;return}
  b.innerHTML=sk.map(s=>`<div class="skill-card" onclick="sel('${s.id}')">${mc(s,s.type,true)}</div>`).join("");
}
function sel(id){const sk=AS.find(s=>s.id===id);if(!sk)return;if(PT==="Technique")T[PS]=sk;else C_[PS]=sk;closePicker();rBP();rSP()}
function rm(type,i){if(type==="Technique")T[i]=null;else C_[i]=null;rBP();rSP()}
function clearBuild(){T=[null,null,null,null];C_=[null,null,null,null];rBP();rSP()}
function copyBuild(){
  const c=SC||"No Class",t=T.filter(Boolean).map(s=>`  \u2022 ${s.name} (${s.class})`).join("\n"),ch=C_.filter(Boolean).map(s=>`  \u2022 ${s.name} (${s.class})`).join("\n");
  navigator.clipboard?.writeText(`\u2694\ufe0f SxS Build: ${c}\n\nTechniques:\n${t||"  (none)"}\n\nCharms:\n${ch||"  (none)"}`);
}
document.getElementById("modal").addEventListener("click",e=>{if(e.target.id==="modal")closePicker()});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closePicker()});
init();
</script>
</body>
</html>
