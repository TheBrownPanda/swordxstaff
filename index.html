<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sword × Staff Build Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;--card:#0e0e1c;--card2:#12122a;--bdr:rgba(255,255,255,.06);--bdr2:rgba(255,255,255,.12);
  --tx:#e8e6e3;--tx2:#aaa;--tx3:#666;--acc:#ffd54f;--acc2:#ff8a65;
  --tech:#5b8dd9;--chrm:#c084fc;
}
html{background:var(--bg);color:var(--tx);font-family:'Outfit',system-ui,sans-serif;-webkit-tap-highlight-color:transparent}
body{min-height:100vh;min-height:100dvh;background:linear-gradient(160deg,#080810,#0e0e1c 40%,#0c1428)}

.header{padding:20px 24px;border-bottom:1px solid var(--bdr);background:rgba(0,0,0,.5);backdrop-filter:blur(14px);position:sticky;top:0;z-index:100}
.header-inner{max-width:800px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:15px;color:var(--tx3);margin-top:2px}
.header-btns{display:flex;gap:10px}
.hbtn{padding:14px 22px;border-radius:10px;border:1px solid var(--bdr);background:rgba(255,255,255,.04);color:var(--tx2);font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;min-height:50px;display:flex;align-items:center;gap:6px}
.hbtn:active{transform:scale(.97)}
.hbtn.danger{border-color:rgba(231,76,60,.3);color:#e74c3c}
.hbtn.primary{border-color:rgba(255,213,79,.35);color:var(--acc)}

/* top nav between pages */
.page-nav{display:flex;gap:8px;margin-bottom:20px}
.page-nav a{flex:1;text-align:center;padding:12px;border-radius:10px;border:1px solid var(--bdr);background:rgba(255,255,255,.04);color:var(--tx2);font-weight:600;text-decoration:none;font-size:15px;transition:.15s}
.page-nav a.active{border-color:rgba(255,213,79,.35);background:rgba(255,213,79,.08);color:var(--acc);font-weight:700}
.page-nav a:active{transform:scale(.98)}

.container{padding:20px;max-width:800px;margin:0 auto}
.panel{background:var(--card);border:1px solid var(--bdr);border-radius:18px;padding:22px;margin-bottom:20px}
.panel-title{font-size:17px;font-weight:700;color:var(--tx2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px}
.panel-title .cn{font-weight:800}

.path-label{font-size:13px;color:var(--tx3);font-weight:700;letter-spacing:1.5px;margin-bottom:8px;margin-top:6px}
.class-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.cls-btn{padding:10px 16px;border-radius:10px;border:1px solid var(--bdr);background:rgba(255,255,255,.03);color:var(--tx2);font-size:16px;cursor:pointer;font-family:inherit;transition:.15s;font-weight:500;min-height:46px}
.cls-btn:active{transform:scale(.96)}
.cls-btn.active{font-weight:700}
.class-path{font-size:14px;color:var(--tx3);margin-top:6px;line-height:1.6}

.slot-section{margin-bottom:20px}
.slot-section:last-child{margin-bottom:0}
.slot-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.slot-count{font-size:15px;color:var(--tx3)}
.slots{display:flex;flex-direction:column;gap:10px}

.skill-card{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:14px;border:1px solid var(--bdr);background:var(--card2);cursor:pointer;transition:.12s;position:relative;min-height:80px}
.skill-card:active{transform:scale(.99);background:rgba(255,255,255,.03)}
.modal-body .skill-card{align-items:flex-start;min-height:0;height:auto;overflow:visible;flex-shrink:0}
.modal-body .skill-desc{overflow:visible;white-space:normal;word-break:break-word}
.skill-icon{width:56px;height:56px;border-radius:12px;overflow:hidden;flex-shrink:0;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)}
.skill-icon img{width:100%;height:100%;object-fit:cover;display:block}
.skill-info{flex:1;min-width:0}
.skill-name{font-size:18px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.skill-meta{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap}
.skill-class{font-size:12px;padding:3px 9px;border-radius:5px;font-weight:700}
.skill-type{font-size:15px;font-weight:500}
.skill-type.technique{color:var(--tech)}
.skill-type.charm{color:var(--chrm)}
.skill-elem{font-size:11px;padding:2px 8px;border-radius:5px;font-weight:600}
.skill-cd{font-size:11px;padding:2px 8px;border-radius:5px;font-weight:600;background:rgba(255,255,255,.06);color:var(--tx2);border:1px solid var(--bdr)}
.skill-dmg{font-size:11px;padding:2px 8px;border-radius:5px;font-weight:700;background:rgba(255,138,101,.12);color:var(--acc2);border:1px solid rgba(255,138,101,.3)}
.rarity-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;align-items:center}
.rarity-label{font-size:12px;color:var(--tx3);font-weight:600;margin-right:2px}
.rbtn{padding:6px 12px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid var(--bdr);background:rgba(255,255,255,.03);color:var(--tx3);min-height:38px}
.rbtn.active{color:#0a0a16}
.skill-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.skill-tag{font-size:11px;padding:2px 8px;border-radius:5px;font-weight:500;background:rgba(255,255,255,.04);color:var(--tx3);border:1px solid var(--bdr)}
.skill-desc{font-size:14px;color:#888;margin-top:6px;line-height:1.45}
.remove-btn{position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:13px;background:rgba(200,50,50,.85);border:none;color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2}
@media(hover:hover){.remove-btn{opacity:0;transition:.15s}.skill-card:hover .remove-btn{opacity:1}}

.empty-slot{border:2px dashed rgba(255,255,255,.08);border-radius:14px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:14px;min-height:80px;background:rgba(255,255,255,.01);transition:.15s}
.empty-slot:active{border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.03)}
.empty-icon{width:56px;height:56px;border-radius:12px;background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center;font-size:26px;color:#333;flex-shrink:0}
.empty-label{font-size:17px;color:#444}

.tags-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.tag{font-size:15px;padding:6px 12px;border-radius:7px;font-weight:600}
.summary-label{font-size:14px;color:var(--tx3);margin-bottom:8px;font-weight:600;letter-spacing:.5px}
.summary-stat{font-size:18px;color:#bbb}

.modal-overlay{position:fixed;inset:0;z-index:1000;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:linear-gradient(180deg,#141428,#0c1428);border:1px solid rgba(255,255,255,.1);border-radius:22px 22px 0 0;width:100%;max-width:640px;max-height:92vh;max-height:92dvh;display:flex;flex-direction:column;box-shadow:0 -10px 40px rgba(0,0,0,.5);padding-bottom:env(safe-area-inset-bottom,0)}
.modal-handle{width:44px;height:5px;border-radius:3px;background:rgba(255,255,255,.15);margin:12px auto 8px}
.modal-header{padding:8px 24px 16px}
.modal-header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-title{font-size:24px;font-weight:700}
.modal-close{background:none;border:none;color:#888;font-size:32px;cursor:pointer;font-family:inherit;padding:6px 10px;min-height:50px;min-width:50px;display:flex;align-items:center;justify-content:center}
.search-toggle{background:none;border:1px solid var(--bdr);border-radius:10px;color:var(--tx2);font-size:20px;cursor:pointer;padding:6px 12px;min-height:50px;min-width:50px;display:flex;align-items:center;justify-content:center;transition:.15s}
.search-toggle.active{background:rgba(91,141,217,.15);border-color:var(--tech);color:var(--tech)}
.search-wrapper{display:none;margin-bottom:4px}
.search-wrapper.open{display:block}
.modal-search{width:100%;padding:14px 18px;border-radius:12px;border:1px solid var(--bdr);background:rgba(0,0,0,.3);color:var(--tx);font-size:18px;outline:none;font-family:inherit}
.modal-search:focus{border-color:var(--tech)}
.filter-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px;max-height:108px;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;scrollbar-width:thin}
.filter-row::-webkit-scrollbar{width:6px}
.filter-row::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}
.fbtn{padding:8px 14px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid var(--bdr);background:rgba(255,255,255,.03);color:var(--tx3);white-space:nowrap;min-height:40px}
.fbtn:active{transform:scale(.96)}
.fbtn.active{color:var(--tx);background:rgba(255,255,255,.1);border-color:var(--bdr2)}
.modal-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 20px 40px;display:flex;flex-direction:column;gap:12px}
.no-results{text-align:center;color:var(--tx3);padding:50px;font-size:17px}

.loading-screen{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;text-align:center}
.loading-screen .icon{font-size:42px;margin-bottom:12px}
.loading-screen .msg{color:var(--tx3);font-size:17px}
.loading-screen .err{color:#e74c3c;font-size:17px;margin-bottom:10px}
.footer{text-align:center;padding:28px 0;font-size:12px;color:#222}

.slot-controls{display:flex;gap:4px;flex-shrink:0;flex-direction:column;align-items:flex-end}
.slot-controls select{background:var(--card);border:1px solid var(--bdr);color:var(--tx);padding:3px 6px;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer;min-height:30px}
.slot-controls select:focus{outline:none;border-color:var(--acc)}
.slot-dmg{font-size:11px;padding:2px 8px;border-radius:5px;font-weight:700;background:rgba(255,138,101,.12);color:var(--acc2);border:1px solid rgba(255,138,101,.3);white-space:nowrap;margin-top:2px}
.level-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:12px 16px;border-radius:12px;background:rgba(255,255,255,.02);border:1px solid var(--bdr)}
.level-row label{font-size:14px;color:var(--tx2);font-weight:600}
.level-row input{background:var(--bg);border:1px solid var(--bdr);color:var(--acc);padding:8px 12px;border-radius:8px;font-size:16px;font-family:inherit;width:80px;text-align:center;font-weight:700}
.level-row input:focus{outline:none;border-color:var(--acc)}
.export-btn{padding:14px 22px;border-radius:10px;border:1px solid rgba(91,141,217,.35);background:rgba(91,141,217,.08);color:var(--tech);font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;min-height:50px;display:flex;align-items:center;gap:6px;white-space:nowrap}
.export-btn:active{transform:scale(.97)}

@media(min-width:640px){
  .modal{border-radius:22px;max-height:82vh;margin-bottom:4vh}
  .modal-overlay{align-items:center}
  .modal-handle{display:none}
  .skill-icon{width:64px;height:64px}
  .skill-card{min-height:88px;gap:16px;padding:16px 18px}
  .skill-name{font-size:20px}
  .skill-desc{font-size:15px}
  .empty-slot{min-height:88px}
  .empty-icon{width:64px;height:64px;font-size:28px}
  .empty-label{font-size:18px}
}
@media(max-width:639px){
  .modal-body .skill-card{padding:12px;gap:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02)}
  .modal-body .skill-desc{font-size:13px;margin-top:4px}
  .modal-body .skill-icon{width:52px;height:52px}
  .modal-body .skill-name{font-size:16px}
  .modal-body .skill-meta{margin-top:2px}
  .modal-header{padding:8px 18px 14px}
  .modal-body{padding:8px 14px 40px;gap:10px}
}
@media(max-width:380px){
  .header{padding:14px 16px}
  .logo{font-size:22px}
  .container{padding:14px}
  .panel{padding:16px}
  .cls-btn{padding:8px 12px;font-size:14px}
}
</style>
</head>
<body>
<div class="header" style="display:none">
  <div class="header-inner">
    <div><div class="logo">⚔️ Sword × Staff</div><div class="logo-sub" id="skill-count">Build Calculator</div></div>
    <div class="header-btns">
      <button class="hbtn danger" onclick="clearBuild()">Clear</button>
      <button class="hbtn primary" onclick="copyBuild()">📋 Copy</button>
      <button class="export-btn" onclick="exportToSim()">🎯 → Sim</button>
    </div>
  </div>
</div>
<div class="container" style="display:none">
  <div class="page-nav">
    <a href="index.html" class="active">⚔️ Build Calculator</a>
    <a href="simulator.html">🎯 Simulator</a>
    <a href="skills.html">📚 Skills</a>
  </div>
  <div class="panel" id="class-panel"></div>
  <div class="panel" id="build-panel"></div>
  <div class="panel" id="summary-panel"></div>
  <div class="footer">Sword × Staff Build Calculator</div>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-header-row">
        <span class="modal-title" id="modal-title">Select Skill</span>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="search-toggle" id="search-toggle" onclick="toggleSearch()">🔍</button>
          <button class="modal-close" onclick="closePicker()">✕</button>
        </div>
      </div>
      <div class="search-wrapper" id="search-wrapper">
        <input class="modal-search" id="modal-search" placeholder="Search skills..." oninput="renderPicker()" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      </div>
      <div class="filter-row" id="filter-row"></div>
      <div class="rarity-row" id="rarity-row"></div>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>
<div class="loading-screen" id="loading-screen"><div><div class="icon">⚔️</div><div class="msg">Loading skill database...</div></div></div>

<script>
const SB="https://ysxbglavmdngayvinrzk.supabase.co",SK="sb_publishable_w9keP2-21tJKR6FcF0YIQA_6q3ykBk-";
const IB=`${SB}/storage/v1/object/public/skill-icons`,LW="https://lootandwaifus.com/skills/swordxstaff",TS="https://www.tsueken.com/content/assets/skills";
const CL=[
  {id:"Warrior",p:"Sword",c:"#e05252"},
  {id:"Knight",p:"Sword",c:"#5b8dd9",pa:"Warrior"},
  {id:"Duelist",p:"Sword",c:"#e8943a",pa:"Warrior"},
  {id:"Paladin",p:"Sword",c:"#4a7bc8",pa:"Knight"},
  {id:"Berserker",p:"Sword",c:"#cc4422",pa:"Duelist"},
  {id:"Guardian",p:"Sword",c:"#3a6ab5",pa:"Paladin"},
  {id:"Conqueror",p:"Sword",c:"#b33318",pa:"Berserker"},
  {id:"Templar",p:"Sword",c:"#2d5a9e",pa:"Guardian"},
  {id:"Ravager",p:"Sword",c:"#992210",pa:"Conqueror"},
  {id:"Mage",p:"Staff",c:"#9b59b6"},
  {id:"Sorcerer",p:"Staff",c:"#8e44ad",pa:"Mage"},
  {id:"Sage",p:"Staff",c:"#27ae60",pa:"Mage"},
  {id:"Archmage",p:"Staff",c:"#7d3c98",pa:"Sorcerer"},
  {id:"Arcanist",p:"Staff",c:"#1e8449",pa:"Sage"},
  {id:"Destroyer",p:"Staff",c:"#6c3483",pa:"Archmage"},
  {id:"Dominator",p:"Staff",c:"#196f3d",pa:"Arcanist"},
  {id:"Magister",p:"Staff",c:"#5b2c6f",pa:"Destroyer"},
  {id:"Prophet",p:"Staff",c:"#145a32",pa:"Dominator"},
];
const CM=Object.fromEntries(CL.map(c=>[c.id,c]));
function gc(s){const r=[s];let x=s;while(CM[x]?.pa){x=CM[x].pa;r.unshift(x)}return r}
function iu(s){const n=(s.id||"").replace("skill_","");return`${IB}/skill_${n}.webp`}
function iuf(s){const n=(s.id||"").replace("skill_","");return`${IB}/sprite_skill_${n}.png`}
function iuf2(s){return`${LW}/${s.id}.png`}

// ---- Shared data model (matches simulator) ----
let AS=[],SKILL_MAP={},SC=null,LVL=1;
// Slots store {id, rarity, star} objects or null — same format as simulator.js technique_slots/charm_slots
let T=[null,null,null,null],C_=[null,null,null,null];
let PT="Technique",PS=0,PF="all";

const RARITIES=["Rare","Epic","Legendary","Mythic","Divine","Immortal"];
const RCOL={Rare:"#5f9aff",Epic:"#9660c4",Legendary:"#e68a23",Mythic:"#ebed63",Divine:"#e05252",Immortal:"#e884e8"};
const RCODE={Rare:'R',Epic:'SR',Legendary:'SSR',Mythic:'UR',Divine:'LR',Immortal:'ER'};
const FIELD_LABELS={SkillAttack1:"Damage",SkillCureByHp:"Heal (HP%)",SkillCureByAttack:"Heal (ATK%)",ShieldByDefence:"Shield (DEF%)",ShieldByTargetHp:"Shield (Target HP%)",StatusDmgAddPer:"DMG increase",StatusDmgReducePer:"DMG reduction",AttackScale:"ATK increase",DefenceScale:"DEF increase"};
const FPAIR={SkillAttack1:'SkillFixedAttack1',SkillAttack2:'SkillFixedAttack2',SkillAttack3:'SkillFixedAttack3',SkillAttack4:'SkillFixedAttack4',SkillCureByHp:'SkillFixedCure',SkillCureByAttack:'SkillFixedCure',ShieldByDefence:'SkillFixedShield',ShieldByTargetHp:'SkillFixedShield',ShieldByConvertedCurHp:'SkillFixedShield',StatusDmgAddPer:'FixedStatusDmgAdd',AttackScale:'FixedAttack',DefenceScale:'FixedDefence',MaxHpScale:'FixedMaxHp',SpeedScale:'FixedSpeed'};
let RARITY="Legendary";
let CURVES=null;

// ---- Curves loader (same as simulator) ----
async function loadCurves(){
  try{const r=await fetch('curves.json');CURVES=await r.json();renderAll();}catch(e){console.warn('curves.json not found — using precomputed values')}
}

// ---- Skill damage computation (shared with simulator) ----
function getSkillDmg(skill, rarity) {
  const sbr = skill.stats_by_rarity;
  if (sbr && sbr[rarity]) {
    const st = sbr[rarity];
    for (const k of ['SkillAttack1','SkillAttack2','SkillAttack3','SkillAttack4']) {
      if (st[k] && typeof st[k] === 'object') return { pct: st[k].pct || 0, flat: st[k].flat || 0 };
    }
  }
  const RIDX={Rare:1,Epic:4,Legendary:8,Mythic:14,Divine:22,Immortal:33};
  if (skill.damage && skill.damage.length) {
    const v = skill.damage[RIDX[rarity]];
    if (v != null) return { pct: v, flat: 0 };
  }
  return { pct: 0, flat: 0 };
}

function getSkillDmgAtLevel(skill, rarity, star, level) {
  if (CURVES && skill.entity_values) {
    const ev = skill.entity_values;
    const rc = RCODE[rarity] || 'SSR';
    const rankNo = parseInt(CURVES.rank_table[rc]?.[String(star)] || CURVES.rank_table[rc]?.['0'] || 6);
    const cs = skill.curve_source || 'skill';
    const bucket = cs === 'status' ? 'status_curves' : 'rank_curves';
    const rr = CURVES[bucket]?.[String(skill.rank_prop_id)]?.[String(rankNo)] || {};
    const subrank = CURVES.rarity_meta[rc]?.subrank || '';
    const cid = CURVES.group_level_map?.[String(skill.group_level_prop_id)]?.[subrank];
    let lr = {};
    if (cid) {
      for (const bk of ['fixed_curves', 'all_fixed_curves']) {
        const b = CURVES[bk]?.[String(cid)];
        if (!b) continue;
        const lvs = Object.keys(b).map(Number).sort((a, b) => a - b);
        let sel = lvs[0] || 0;
        for (const l of lvs) if (l <= level) sel = l;
        lr = b[String(sel)] || {};
        break;
      }
    }
    for (const f of ['SkillAttack1','SkillAttack2','SkillAttack3','SkillAttack4']) {
      const paired = FPAIR[f];
      if (ev[f] != null) {
        const pb = Number(ev[f]), ps = Number(rr[f] || 0);
        const pct = pb && ps ? (pb * ps) / 1e6 : 0;
        const fb = Number(ev[paired] || 0), fr = Number(rr[paired] || 0), fl = Number(lr[paired] || 0);
        const flat = fl && fb && fr ? (fl * fb * fr) / 1e8 : 0;
        if (pct || flat) return { pct: Math.round(pct * 10) / 10, flat: Math.round(flat) };
      }
    }
  }
  return getSkillDmg(skill, rarity);
}

function getMaxStar(rarity) {
  if (!CURVES || !CURVES.rarity_meta) return 3;
  const rc = RCODE[rarity] || 'SSR';
  return parseInt(CURVES.rarity_meta[rc]?.max_star || 3);
}

// ---- Buff/charm value helper ----
function getCharmValue(skill, rarity) {
  if (skill.extra_entity_stats) {
    for (const ex of skill.extra_entity_stats) {
      const est = ex.stats && ex.stats[rarity]; if (!est) continue;
      for (const [k, v] of Object.entries(est)) {
        if (typeof v === 'object' && (v.pct || v.flat)) return { key: k, pct: v.pct || 0, flat: v.flat || 0 };
      }
    }
  }
  if (skill.passive_status_stats) {
    for (const ps of skill.passive_status_stats) {
      const pst = ps.stats && ps.stats[rarity]; if (!pst) continue;
      for (const [k, v] of Object.entries(pst)) {
        if (typeof v === 'object' && (v.pct || v.flat)) return { key: k, pct: v.pct || 0, flat: v.flat || 0 };
      }
    }
  }
  if (skill.passive_factor_stats && skill.passive_factor_stats[rarity]) {
    const pfs = skill.passive_factor_stats[rarity];
    for (const [k, v] of Object.entries(pfs)) {
      if (typeof v === 'object' && (v.pct || v.value)) return { key: k, pct: v.pct || v.value || 0, flat: 0 };
    }
  }
  return null;
}

// ---- Init ----
async function init(){
  try{
    const r=await fetch(`${SB}/rest/v1/skills?select=*&order=name&limit=500`,{headers:{apikey:SK,Authorization:`Bearer ${SK}`}});
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    AS=(await r.json()).filter(s=>s.name);
    SKILL_MAP=Object.fromEntries(AS.map(s=>[s.id,s]));
    document.getElementById("loading-screen").style.display="none";
    document.querySelector(".header").style.display="";
    document.querySelector(".container").style.display="";
    document.getElementById("skill-count").textContent=`Build Calculator \u2022 ${AS.length} skills`;
    renderAll();
    loadCurves();
  }catch(e){
    document.getElementById("loading-screen").innerHTML=`<div><div class="icon">\u26a0\ufe0f</div><div class="err">Failed to load: ${e.message}</div><div class="msg">Check Supabase connection</div></div>`;
  }
}
function renderAll(){rCP();rBP();rSP()}
function rCP(){
  const p=document.getElementById("class-panel");
  let h=`<div class="panel-title">Class ${SC?`<span class="cn" style="color:${CM[SC]?.c}">\u2014 ${SC}</span>`:""}</div>`;
  ["Sword","Staff"].forEach(path=>{
    h+=`<div class="path-label">${path==="Sword"?"WARRIOR PATH":"MAGE PATH"}</div><div class="class-row">`;
    CL.filter(c=>c.p===path).forEach(c=>{
      const a=SC===c.id;
      h+=`<button class="cls-btn${a?" active":""}" style="${a?`color:${c.c};border-color:${c.c};background:${c.c}18`:""}" onclick="SC=SC==='${c.id}'?null:'${c.id}';renderAll()">${c.id}</button>`;
    });
    h+=`</div>`;
  });
  if(SC)h+=`<div class="class-path">Path: ${gc(SC).map(c=>`<span style="color:${CM[c]?.c}">${c}</span>`).join(" \u2192 ")}</div>`;
  p.innerHTML=h;
}
function sType(s){return s.type==="combat"||s.type==="Technique"?"Technique":"Charm"}

// ---- Render a skill card from slot config {id, rarity, star} ----
function mc(slot,type,desc){
  const sk=SKILL_MAP[slot.id];
  if(!sk) return `<div class="skill-info"><div class="skill-name" style="color:#666">Unknown skill</div></div>`;
  const cc=CM[sk.profession||sk.class]?.c||CM[sk.class]?.c||"#888";
  const ec=elemColor(sk.element);
  let meta=`<span class="skill-class" style="background:${cc}18;color:${cc};border:1px solid ${cc}33">${sk.profession||sk.class}</span>`;
  meta+=`<span class="skill-type ${type.toLowerCase()}">${type}</span>`;
  if(sk.element)meta+=`<span class="skill-elem" style="background:${ec}1f;color:${ec};border:1px solid ${ec}40">${sk.element}</span>`;
  if(sk.cooldown!=null&&sk.cooldown>0)meta+=`<span class="skill-cd">CD ${sk.cooldown}</span>`;
  else if(sk.cooldown===0)meta+=`<span class="skill-cd">No CD</span>`;
  return`<div class="skill-icon"><img src="${iu(sk)}" onerror="this.onerror=()=>{this.onerror=null;this.src='${iuf2(sk)}'};this.src='${iuf(sk)}'" alt=""></div>
  <div class="skill-info"><div class="skill-name">${sk.name}</div>
  <div class="skill-meta">${meta}</div>
  ${desc&&sk.description?`<div class="skill-desc">${sk.description}</div>`:""}
  ${desc&&sk.tags&&sk.tags.length?`<div class="skill-tags">${sk.tags.map(t=>`<span class="skill-tag">${t}</span>`).join("")}</div>`:""}</div>`;
}

// Render a picker card directly from a skill object (used in modal)
function mcPicker(sk,type){
  const cc=CM[sk.profession||sk.class]?.c||CM[sk.class]?.c||"#888";
  const ec=elemColor(sk.element);
  let meta=`<span class="skill-class" style="background:${cc}18;color:${cc};border:1px solid ${cc}33">${sk.profession||sk.class}</span>`;
  meta+=`<span class="skill-type ${type.toLowerCase()}">${type}</span>`;
  if(sk.element)meta+=`<span class="skill-elem" style="background:${ec}1f;color:${ec};border:1px solid ${ec}40">${sk.element}</span>`;
  if(sk.cooldown!=null&&sk.cooldown>0)meta+=`<span class="skill-cd">CD ${sk.cooldown}</span>`;
  else if(sk.cooldown===0)meta+=`<span class="skill-cd">No CD</span>`;
  // Show damage at picker rarity
  if(sk.stats_by_rarity&&sk.stats_by_rarity[RARITY]){
    const st=sk.stats_by_rarity[RARITY];
    for(const k of["SkillAttack1","SkillCureByHp","SkillCureByAttack","ShieldByDefence","ShieldByTargetHp","StatusDmgAddPer","StatusDmgReducePer","AttackScale","DefenceScale"]){
      if(st[k]&&typeof st[k]==="object"&&(st[k].pct||st[k].flat)){
        const flat=st[k].flat>=1e3?(st[k].flat/1e3).toFixed(1)+"K":st[k].flat;
        meta+=`<span class="skill-dmg">${st[k].pct}%+${flat} ${RARITY}</span>`;break;
      }
    }
    if(!meta.includes("skill-dmg")){
      if(sk.extra_entity_stats)for(const ex of sk.extra_entity_stats){
        const est=ex.stats&&ex.stats[RARITY];if(!est)continue;
        for(const[k,v]of Object.entries(est)){
          if(typeof v==="object"&&(v.pct||v.flat)){const flat=v.flat>=1e3?(v.flat/1e3).toFixed(1)+"K":v.flat;meta+=`<span class="skill-dmg">${v.pct}%+${flat}</span>`;break;}
        }if(meta.includes("skill-dmg"))break;
      }
    }
  }else if(sk.damage&&sk.damage.length){
    const ridx={Rare:1,Epic:4,Legendary:8,Mythic:14,Divine:22,Immortal:33};
    const v=sk.damage[ridx[RARITY]];
    if(v!=null)meta+=`<span class="skill-dmg">${v}% ${RARITY}</span>`;
  }
  return`<div class="skill-icon"><img src="${iu(sk)}" onerror="this.onerror=()=>{this.onerror=null;this.src='${iuf2(sk)}'};this.src='${iuf(sk)}'" alt=""></div>
  <div class="skill-info"><div class="skill-name">${sk.name}</div>
  <div class="skill-meta">${meta}</div>
  ${sk.description?`<div class="skill-desc">${sk.description}</div>`:""}
  ${sk.tags&&sk.tags.length?`<div class="skill-tags">${sk.tags.map(t=>`<span class="skill-tag">${t}</span>`).join("")}</div>`:""}</div>`;
}

function elemColor(e){
  return {Physical:"#b0a89a",Fire:"#e8703a",Water:"#3aa5e8",Wind:"#5ec98a",Light:"#ecd25a",Dark:"#a06cd0"}[e]||"#888";
}
function fmtFlat(v){return v>=1e3?(v/1e3).toFixed(1)+"K":Math.round(v)}

// ---- Build panel with per-slot rarity/star + level ----
function rBP(){
  const p=document.getElementById("build-panel");
  let h=`<div class="level-row"><label>Skill Level</label><input type="number" min="1" max="400" value="${LVL}" onchange="LVL=parseInt(this.value)||1;rBP();rSP()"><span style="color:var(--tx3);font-size:12px">Used for flat damage scaling via curves</span></div>`;
  [{t:"Techniques",y:"Technique",s:T},{t:"Charms",y:"Charm",s:C_}].forEach(({t,y,s})=>{
    h+=`<div class="slot-section"><div class="slot-header"><span class="panel-title" style="margin:0">${t}</span><span class="slot-count">${s.filter(Boolean).length}/4</span></div><div class="slots">`;
    s.forEach((slot,i)=>{
      if(slot&&slot.id&&SKILL_MAP[slot.id]){
        const sk=SKILL_MAP[slot.id];
        const rarity=slot.rarity||sk.initial_rarity||"Legendary";
        const star=slot.star||0;
        const maxStar=getMaxStar(rarity);
        // Compute damage/value preview at this slot's rarity/star/level
        let dmgHtml="";
        if(y==="Technique"){
          const d=getSkillDmgAtLevel(sk,rarity,star,LVL);
          if(d.pct||d.flat) dmgHtml=`<span class="slot-dmg">${d.pct}% + ${fmtFlat(d.flat)} @ Lv${LVL}</span>`;
        }else{
          const cv=getCharmValue(sk,rarity);
          if(cv){
            const lbl=FIELD_LABELS[cv.key]||cv.key.replace(/([A-Z])/g,' $1').trim();
            dmgHtml=`<span class="slot-dmg">${cv.pct}% ${lbl}</span>`;
          }
        }
        h+=`<div class="skill-card" onclick="openPicker('${y}',${i})">
          ${mc(slot,y,false)}
          <div class="slot-controls" onclick="event.stopPropagation()">
            <button class="remove-btn" style="position:static;margin-bottom:2px" onclick="rm('${y}',${i})">\u00d7</button>
            <select onchange="setSlotProp('${y}',${i},'rarity',this.value)">
              ${RARITIES.map(r=>`<option ${rarity===r?"selected":""} style="color:${RCOL[r]}">${r}</option>`).join("")}
            </select>
            <select onchange="setSlotProp('${y}',${i},'star',parseInt(this.value))">
              ${Array.from({length:maxStar+1},(_,n)=>`<option value="${n}" ${star===n?"selected":""}>${n}\u2605</option>`).join("")}
            </select>
            ${dmgHtml}
          </div>
        </div>`;
      } else {
        h+=`<div class="empty-slot" onclick="openPicker('${y}',${i})"><div class="empty-icon">+</div><span class="empty-label">Add ${y}</span></div>`;
      }
    });
    h+=`</div></div>`;
  });
  p.innerHTML=h;
}

function setSlotProp(type,idx,prop,val){
  const s=type==="Technique"?T:C_;
  if(s[idx]){s[idx][prop]=val;rBP();rSP()}
}

function rSP(){
  const p=document.getElementById("summary-panel");
  const eq=[...T,...C_].filter(Boolean).map(s=>SKILL_MAP[s.id]).filter(Boolean);
  const cls=[...new Set(eq.map(s=>s.profession||s.class))];
  let h=`<div class="panel-title">Build Summary</div><div class="summary-label">CLASSES USED</div><div class="tags-row">`;
  if(cls.length)cls.forEach(c=>{const cc=CM[c]?.c||"#888";h+=`<span class="tag" style="background:${cc}18;color:${cc};border:1px solid ${cc}33">${c}</span>`;});
  else h+=`<span style="font-size:16px;color:#444;font-style:italic">No skills equipped</span>`;
  h+=`</div><div class="summary-label" style="margin-top:12px">EQUIPPED</div>`;
  h+=`<div class="summary-stat">${T.filter(Boolean).length} Techniques \u2022 ${C_.filter(Boolean).length} Charms</div>`;
  // Show total buff contribution from charms
  const charmBuffs=C_.filter(Boolean).map(s=>{
    const sk=SKILL_MAP[s.id];if(!sk)return null;
    const cv=getCharmValue(sk,s.rarity||"Legendary");
    return cv?{name:sk.name,key:cv.key,pct:cv.pct}:null;
  }).filter(Boolean);
  if(charmBuffs.length){
    h+=`<div class="summary-label" style="margin-top:12px">CHARM BUFFS</div>`;
    charmBuffs.forEach(b=>{
      const lbl=FIELD_LABELS[b.key]||b.key.replace(/([A-Z])/g,' $1').trim();
      h+=`<div style="font-size:14px;color:#aaa;padding:2px 0">${b.name}: <span style="color:var(--acc)">${b.pct}%</span> ${lbl}</div>`;
    });
  }
  p.innerHTML=h;
}

// ---- Picker modal ----
function openPicker(type,idx){
  PT=type;PS=idx;PF=SC||"all";
  document.getElementById("modal-title").textContent=`Select ${type}`;
  document.getElementById("modal-search").value="";
  document.getElementById("search-wrapper").classList.remove("open");
  document.getElementById("search-toggle").classList.remove("active");
  rFR();rRR();renderPicker();
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow="hidden";
}
function rRR(){
  let h=`<span class="rarity-label">Preview @</span>`;
  RARITIES.forEach(r=>{
    const a=RARITY===r;
    h+=`<button class="rbtn${a?" active":""}" style="${a?`background:${RCOL[r]};border-color:${RCOL[r]}`:`color:${RCOL[r]}`}" onclick="RARITY='${r}';rRR();renderPicker()">${r}</button>`;
  });
  document.getElementById("rarity-row").innerHTML=h;
}
function toggleSearch(){
  const w=document.getElementById("search-wrapper");
  const b=document.getElementById("search-toggle");
  const open=w.classList.toggle("open");
  b.classList.toggle("active",open);
  if(open){document.getElementById("modal-search").focus()}
  else{document.getElementById("modal-search").value="";renderPicker()}
}
function closePicker(){document.getElementById("modal").classList.remove("open");document.body.style.overflow=""}
function rFR(){
  const cls=[...new Set(AS.filter(s=>sType(s)===PT&&s.name).map(s=>s.profession||s.class))];
  const ord=CL.filter(c=>cls.includes(c.id));
  let h=`<button class="fbtn${PF==="all"?" active":""}" onclick="PF='all';rFR();renderPicker()">All</button>`;
  ord.forEach(c=>{h+=`<button class="fbtn${PF===c.id?" active":""}" style="${PF===c.id?`color:${c.c};border-color:${c.c}`:""}" onclick="PF='${c.id}';rFR();renderPicker()">${c.id}</button>`;});
  document.getElementById("filter-row").innerHTML=h;
}
function renderPicker(){
  const q=document.getElementById("modal-search").value.toLowerCase();
  const eq=new Set([...T,...C_].filter(Boolean).map(s=>s.id));
  let sk=AS.filter(s=>sType(s)===PT&&s.name&&!eq.has(s.id));
  if(PF!=="all")sk=sk.filter(s=>(s.profession||s.class)===PF);
  else if(SC){const ch=gc(SC);sk=sk.filter(s=>ch.includes(s.profession||s.class))}
  if(q)sk=sk.filter(s=>s.name.toLowerCase().includes(q)||(s.description||"").toLowerCase().includes(q));
  const b=document.getElementById("modal-body");
  if(!sk.length){b.innerHTML=`<div class="no-results">No matching skills</div>`;return}
  b.innerHTML=sk.map(s=>`<div class="skill-card" onclick="sel('${s.id}')">${mcPicker(s,sType(s),true)}</div>`).join("");
}

// ---- Slot actions ----
function sel(id){
  const sk=SKILL_MAP[id];if(!sk)return;
  const rarity=sk.initial_rarity||"Legendary";
  const slot={id:id,rarity:rarity,star:0};
  if(PT==="Technique")T[PS]=slot;else C_[PS]=slot;
  closePicker();rBP();rSP();
}
function rm(type,i){if(type==="Technique")T[i]=null;else C_[i]=null;rBP();rSP()}
function clearBuild(){T=[null,null,null,null];C_=[null,null,null,null];LVL=1;rBP();rSP()}

// ---- Copy build as text ----
function copyBuild(){
  const c=SC||"No Class";
  const t=T.filter(Boolean).map(s=>{const sk=SKILL_MAP[s.id];return sk?`  \u2022 ${sk.name} [${s.rarity} ${s.star}\u2605]`:`  \u2022 ${s.id}`}).join("\n");
  const ch=C_.filter(Boolean).map(s=>{const sk=SKILL_MAP[s.id];return sk?`  \u2022 ${sk.name} [${s.rarity} ${s.star}\u2605]`:`  \u2022 ${s.id}`}).join("\n");
  navigator.clipboard?.writeText(`\u2694\ufe0f SxS Build: ${c} (Lv${LVL})\n\nTechniques:\n${t||"  (none)"}\n\nCharms:\n${ch||"  (none)"}`);
}

// ---- Export to Simulator ----
function exportToSim(){
  const build={
    c: SC||"",
    l: LVL,
    t: T.filter(Boolean).map(s=>({i:s.id,r:s.rarity,s:s.star})),
    ch: C_.filter(Boolean).map(s=>({i:s.id,r:s.rarity,s:s.star}))
  };
  const encoded=btoa(JSON.stringify(build));
  const url=`simulator.html?import=${encoded}`;
  // Open in same tab for mobile friendliness
  window.location.href=url;
}

// ---- Event listeners ----
document.getElementById("modal").addEventListener("click",e=>{if(e.target.id==="modal")closePicker()});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closePicker()});
init();
</script>
