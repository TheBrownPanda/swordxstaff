<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>DPS Calculator — Sword × Staff</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="header"><div class="header-inner">
  <div><div class="logo">Sword <b>×</b> Staff</div><div class="logo-sub" id="sub">Loading…</div></div>
  <div class="page-nav">
    <a href="index.html">Build</a>
    <a href="simulator.html" class="active">DPS Calc</a>
    <a href="skills.html">Skills</a>
  </div>
</div></div>

<div class="container" id="app" style="display:none">
  <div class="panel" id="build-panel"></div>
  <div class="panel" id="player-panel"></div>
  <div class="panel" id="boss-panel"></div>
  <button class="calc-btn" onclick="calculate()">Calculate DPS</button>
  <div id="results"></div>
</div>

<div class="loading" id="loading"><div><div class="spin"></div><div>Loading skill database…</div></div></div>

<div class="modal-overlay" id="modal"><div class="modal">
  <div class="modal-handle"></div>
  <div class="modal-header"><div class="modal-header-row">
    <span class="modal-title" id="modal-title">Select Skill</span>
    <button class="modal-close" onclick="closeModal()">✕</button>
  </div>
  <input class="modal-search" id="modal-search" placeholder="Search skills…" oninput="renderPicker()" autocomplete="off" autocorrect="off" autocapitalize="off">
  <div class="filter-row" id="filter-row"></div>
  </div>
  <div class="modal-body" id="modal-body"></div>
</div></div>
<div class="toast" id="toast"></div>

<script src="simulator.js"></script>
</body>
</html>
