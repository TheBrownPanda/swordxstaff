<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sword × Staff Boss DPS Simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;--card:#0e0e1c;--card2:#12122a;--bdr:rgba(255,255,255,.06);--bdr2:rgba(255,255,255,.12);
  --tx:#e8e6e3;--tx2:#aaa;--tx3:#666;--acc:#ffd54f;--acc2:#ff8a65;
  --tech:#5b8dd9;--chrm:#c084fc;--ok:#6fae5a;--bad:#e0574a;
}
html{background:var(--bg);color:var(--tx);font-family:'Outfit',system-ui,sans-serif;-webkit-tap-highlight-color:transparent}
body{min-height:100vh;min-height:100dvh;background:linear-gradient(160deg,#080810,#0e0e1c 40%,#0c1428)}
.header{padding:20px 24px;border-bottom:1px solid var(--bdr);background:rgba(0,0,0,.5);backdrop-filter:blur(14px);position:sticky;top:0;z-index:100}
.header-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo{font-size:26px;font-weight:800;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:14px;color:var(--tx3);margin-top:2px}
.nav{display:flex;gap:8px}
.nav a{padding:10px 16px;border-radius:10px;border:1px solid var(--bdr);background:rgba(255,255,255,.04);color:var(--tx2);font-size:14px;font-weight:600;text-decoration:none;transition:.15s}
.nav a.active{color:var(--acc);border-color:rgba(255,213,79,.35)}
.page-nav{display:flex;gap:8px;margin-bottom:20px}
.page-nav a{flex:1;text-align:center;padding:12px;border-radius:10px;border:1px solid var(--bdr);background:rgba(255,255,255,.04);color:var(--tx2);font-weight:600;text-decoration:none;font-size:15px;transition:.15s}
.page-nav a.active{border-color:rgba(255,213,79,.35);background:rgba(255,213,79,.08);color:var(--acc);font-weight:700}
.page-nav a:active{transform:scale(.98)}

.container{padding:20px;max-width:860px;margin:0 auto}
.tabs{display:flex;gap:6px;background:var(--card);padding:6px;border-radius:14px;margin-bottom:20px;border:1px solid var(--bdr)}
.tab{flex:1;padding:12px;border:none;background:transparent;color:var(--tx2);border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.tab.active{background:var(--acc);color:#0a0a16;font-weight:700}

.panel{background:var(--card);border:1px solid var(--bdr);border-radius:18px;padding:22px;margin-bottom:20px}
.panel-title{font-size:16px;font-weight:700;color:var(--tx2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}

.upload-zone{border:1px dashed var(--acc2);border-radius:12px;padding:16px;text-align:center;color:var(--acc);cursor:pointer;background:rgba(255,138,101,.04);font-size:14px;font-weight:600;margin-bottom:14px;display:block}
.upload-zone.busy{cursor:wait;opacity:.7}
.ocr-status{font-size:13px;color:var(--ok);margin-bottom:12px}
.ocr-raw{font-size:11px;color:var(--tx3);white-space:pre-wrap;background:var(--bg);padding:10px;border-radius:8px;margin-top:8px;max-height:140px;overflow:auto}

.field{display:flex;align-items:center;gap:10px;padding:4px 0}
.field label{flex:1;color:var(--tx3);font-size:13px}
.field input,.field select{background:var(--bg);border:1px solid var(--bdr);color:var(--tx);padding:7px 10px;border-radius:7px;font-size:14px;font-family:inherit;width:130px;text-align:right}
.field select{text-align:left}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px 18px}
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:2px 20px;margin-top:6px}

.input{width:100%;background:var(--bg);border:1px solid var(--bdr);color:var(--tx);padding:10px 12px;border-radius:8px;font-size:15px;font-family:inherit;margin-bottom:10px}
.btn{padding:11px 18px;border-radius:10px;border:1px solid var(--bdr);background:rgba(255,255,255,.04);color:var(--tx);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--acc);color:#0a0a16;border-color:var(--acc);font-weight:700}
.btn.ghost{border-style:dashed;color:var(--acc);width:100%;background:transparent}
.btn.danger{color:var(--bad);border-color:rgba(224,87,74,.3)}
.btn.sm{padding:7px 12px;font-size:13px}

.member-card{background:var(--card2);border:1px solid var(--bdr);border-radius:14px;padding:16px;margin-bottom:14px}
.member-head{display:flex;gap:10px;align-items:center;margin-bottom:12px}
.member-head input{flex:1}
.skill-slots{display:flex;flex-direction:column;gap:8px;margin:10px 0}
.slot{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;border:1px solid var(--bdr);background:var(--bg);cursor:pointer;min-height:56px}
.slot.empty{border-style:dashed;color:#444;justify-content:center}
.slot-num{width:22px;height:22px;border-radius:11px;background:rgba(255,255,255,.06);color:var(--tx3);font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700}
.slot-icon{width:40px;height:40px;border-radius:8px;overflow:hidden;flex-shrink:0;background:rgba(255,255,255,.04)}
.slot-icon img{width:100%;height:100%;object-fit:cover}
.slot-info{flex:1;min-width:0}
.slot-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot-meta{font-size:12px;color:var(--tx3);margin-top:2px}
.slot-rm{background:rgba(200,50,50,.2);border:none;color:#e88;width:26px;height:26px;border-radius:13px;cursor:pointer;flex-shrink:0}

.bar-wrap{height:18px;background:var(--bg);border-radius:9px;overflow:hidden;border:1px solid var(--bdr);margin:8px 0}
.bar{height:100%;transition:width .5s;border-radius:9px}
.verdict{text-align:center;font-size:20px;font-weight:800;margin:10px 0}
.big-num{font-size:36px;font-weight:800;color:var(--acc);text-align:center;font-family:inherit}
.res-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--bdr);font-size:14px}
.trace{font-size:12px;color:var(--tx3);background:var(--bg);border-radius:8px;padding:10px;max-height:240px;overflow:auto;margin-top:10px;line-height:1.6}
.note{font-size:12px;color:var(--tx3);line-height:1.6;margin-top:14px}

.modal-overlay{position:fixed;inset:0;z-index:1000;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:linear-gradient(180deg,#141428,#0c1428);border:1px solid rgba(255,255,255,.1);border-radius:22px 22px 0 0;width:100%;max-width:640px;max-height:90vh;display:flex;flex-direction:column}
.modal-header{padding:18px 22px 12px;border-bottom:1px solid var(--bdr)}
.modal-header-row{display:flex;justify-content:space-between;align-items:center}
.modal-title{font-size:20px;font-weight:700}
.modal-close{background:none;border:none;color:#888;font-size:28px;cursor:pointer}
.modal-search{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--bdr);background:rgba(0,0,0,.3);color:var(--tx);font-size:16px;margin-top:12px;font-family:inherit}
.modal-body{flex:1;overflow-y:auto;padding:12px 18px 30px;display:flex;flex-direction:column;gap:8px}
.pick-card{display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;border:1px solid var(--bdr);background:rgba(255,255,255,.02);cursor:pointer}
.pick-card:active{background:rgba(255,255,255,.05)}

.loading{min-height:60vh;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--tx3)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--bdr2);padding:12px 20px;border-radius:10px;font-size:14px;z-index:2000;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:560px){.grid2,.statgrid{grid-template-columns:1fr}.modal-overlay{align-items:flex-end}}
</style>
</head>
<body>
<div class="header"><div class="header-inner">
  <div><div class="logo">⚔️ Boss DPS Simulator</div><div class="logo-sub" id="sub">50-round guild boss rotation</div></div>
</div></div>

<div class="container" id="app" style="display:none">
  <div class="page-nav">
    <a href="index.html">⚔️ Build Calculator</a>
    <a href="simulator.html" class="active">🎯 Boss DPS Simulator</a>
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="boss" onclick="setTab('boss')">Boss</button>
    <button class="tab" data-tab="roster" onclick="setTab('roster')">Roster</button>
    <button class="tab" data-tab="results" onclick="setTab('results')">Results</button>
  </div>
  <div id="tab-boss"></div>
  <div id="tab-roster" style="display:none"></div>
  <div id="tab-results" style="display:none"></div>
</div>

<div class="loading" id="loading"><div><div style="font-size:38px">⚔️</div><div>Loading skills &amp; roster…</div></div></div>

<div class="modal-overlay" id="modal"><div class="modal">
  <div class="modal-header"><div class="modal-header-row">
    <span class="modal-title" id="modal-title">Select Skill</span>
    <button class="modal-close" onclick="closeModal()">✕</button>
  </div>
  <input class="modal-search" id="modal-search" placeholder="Search skills…" oninput="renderPicker()" autocomplete="off">
  </div>
  <div class="modal-body" id="modal-body"></div>
</div></div>
<div class="toast" id="toast"></div>

<script src="simulator.js"></script>
</body>
</html>
