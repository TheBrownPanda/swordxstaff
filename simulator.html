<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sword × Staff DPS Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;--card:#0e0e1c;--card2:#12122a;--bdr:rgba(255,255,255,.06);--bdr2:rgba(255,255,255,.12);
  --tx:#e8e6e3;--tx2:#aaa;--tx3:#666;--acc:#ffd54f;--acc2:#ff8a65;
  --tech:#5b8dd9;--chrm:#c084fc;--ok:#6fae5a;--bad:#e0574a;
}
html{background:var(--bg);color:var(--tx);font-family:'Outfit',system-ui,sans-serif;-webkit-tap-highlight-color:transparent}
body{min-height:100vh;min-height:100dvh;background:linear-gradient(160deg,#080810,#0e0e1c 40%,#0c1428)}
.header{padding:16px 24px;border-bottom:1px solid var(--bdr);background:rgba(0,0,0,.5);backdrop-filter:blur(14px);position:sticky;top:0;z-index:100}
.header-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{font-size:24px;font-weight:800;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:13px;color:var(--tx3);margin-top:2px}
.page-nav{display:flex;gap:8px;margin-bottom:16px}
.page-nav a{flex:1;text-align:center;padding:12px;border-radius:10px;border:1px solid var(--bdr);background:rgba(255,255,255,.04);color:var(--tx2);font-weight:600;text-decoration:none;font-size:14px;transition:.15s}
.page-nav a.active{border-color:rgba(255,213,79,.35);background:rgba(255,213,79,.08);color:var(--acc);font-weight:700}
.page-nav a:active{transform:scale(.98)}
.container{padding:16px;max-width:860px;margin:0 auto}

.panel{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:18px;margin-bottom:14px}
.panel-title{font-size:15px;font-weight:700;color:var(--tx2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}

/* Collapsible sections */
.section-toggle{background:none;border:none;color:var(--tx2);font-family:inherit;font-size:15px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:8px;padding:0;width:100%;text-align:left}
.section-toggle .arrow{transition:transform .2s;font-size:12px;color:var(--tx3)}
.section-toggle.open .arrow{transform:rotate(90deg)}
.section-body{overflow:hidden;transition:max-height .25s ease;max-height:0}
.section-body.open{max-height:2000px}

/* Skill slots */
.skill-slots{display:flex;flex-direction:column;gap:6px;margin:8px 0}
.slot{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;border:1px solid var(--bdr);background:var(--bg);min-height:50px}
.slot.empty{border-style:dashed;color:#444;cursor:pointer;justify-content:center;font-size:13px}
.slot.empty:active{background:rgba(255,255,255,.02)}
.slot-num{width:20px;height:20px;border-radius:10px;background:rgba(255,255,255,.06);color:var(--tx3);font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700}
.slot-icon{width:36px;height:36px;border-radius:7px;overflow:hidden;flex-shrink:0;background:rgba(255,255,255,.04)}
.slot-icon img{width:100%;height:100%;object-fit:cover}
.slot-info{flex:1;min-width:0}
.slot-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot-meta{font-size:11px;color:var(--tx3);margin-top:1px}
.slot-controls{display:flex;gap:3px;flex-shrink:0;flex-direction:column;align-items:flex-end}
.slot-controls select{background:var(--card2);border:1px solid var(--bdr);color:var(--tx);padding:2px 4px;border-radius:5px;font-size:11px;font-family:inherit;cursor:pointer;min-height:26px}
.slot-rm{background:rgba(200,50,50,.2);border:none;color:#e88;width:22px;height:22px;border-radius:11px;cursor:pointer;flex-shrink:0;font-size:14px;display:flex;align-items:center;justify-content:center}
.slot-dmg{font-size:10px;color:var(--acc2);white-space:nowrap}

/* Stat grid */
.stat-group{margin-bottom:12px}
.stat-group-label{font-size:11px;font-weight:700;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;padding-left:2px}
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:2px 16px}
.field{display:flex;align-items:center;gap:8px;padding:3px 0}
.field label{flex:1;color:var(--tx3);font-size:12px;white-space:nowrap}
.field input{background:var(--bg);border:1px solid var(--bdr);color:var(--tx);padding:6px 8px;border-radius:6px;font-size:13px;font-family:inherit;width:100px;text-align:right}
.field input:focus{outline:none;border-color:var(--acc)}
.pct-mark{color:var(--tx3);font-size:11px;margin-left:-2px}

/* Level row */
.level-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.level-row label{font-size:13px;color:var(--tx2);font-weight:600}
.level-row input{background:var(--bg);border:1px solid var(--bdr);color:var(--acc);padding:6px 10px;border-radius:7px;font-size:15px;font-family:inherit;width:70px;text-align:center;font-weight:700}
.level-row input:focus{outline:none;border-color:var(--acc)}
.rounds-row{display:flex;align-items:center;gap:10px;margin-top:10px}
.rounds-row label{font-size:13px;color:var(--tx2);font-weight:600}
.rounds-row input{background:var(--bg);border:1px solid var(--bdr);color:var(--tx);padding:6px 10px;border-radius:7px;font-size:15px;font-family:inherit;width:70px;text-align:center;font-weight:600}
.rounds-row input:focus{outline:none;border-color:var(--acc)}

/* Buttons */
.btn{padding:11px 18px;border-radius:10px;border:1px solid var(--bdr);background:rgba(255,255,255,.04);color:var(--tx);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}

/* OCR upload */
.upload-zone{border:1px dashed var(--acc2);border-radius:10px;padding:12px;text-align:center;color:var(--acc);cursor:pointer;background:rgba(255,138,101,.04);font-size:13px;font-weight:600;margin:10px 0;display:block}
.upload-zone.busy{cursor:wait;opacity:.6;pointer-events:none}
.ocr-status{font-size:12px;color:var(--ok);margin:6px 0}
.ocr-raw{font-size:10px;color:var(--tx3);white-space:pre-wrap;background:var(--bg);padding:8px;border-radius:6px;margin-top:6px;max-height:120px;overflow:auto}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--acc);color:#0a0a16;border-color:var(--acc);font-weight:700}
.btn.sm{padding:6px 12px;font-size:12px}
.btn.danger{color:var(--bad);border-color:rgba(224,87,74,.3)}
.calc-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#0a0a16;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;transition:.15s;margin-bottom:14px}
.calc-btn:active{transform:scale(.98)}

/* Results */
.result-summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.result-card{background:var(--bg);border:1px solid var(--bdr);border-radius:10px;padding:12px;text-align:center}
.result-card .val{font-size:22px;font-weight:800;color:var(--acc)}
.result-card .label{font-size:11px;color:var(--tx3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.skill-breakdown{margin-bottom:14px}
.skill-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bdr);font-size:13px}
.skill-row:last-child{border-bottom:none}
.skill-row .bar-bg{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.skill-row .bar-fill{height:100%;border-radius:4px;transition:width .3s}
.skill-row .pct{font-size:11px;color:var(--tx3);width:40px;text-align:right;flex-shrink:0}
.skill-row .total{font-size:12px;color:var(--acc);width:60px;text-align:right;flex-shrink:0;font-weight:600}
.round-trace{font-size:11px;color:var(--tx3);background:var(--bg);border-radius:8px;padding:10px;max-height:300px;overflow:auto;line-height:1.7;margin-top:8px}
.round-trace .r-num{color:var(--tech);font-weight:700}
.round-trace .r-dmg{color:var(--acc)}
.formula-note{font-size:11px;color:var(--tx3);line-height:1.5;margin-top:10px;padding:10px;border-radius:8px;border:1px solid var(--bdr)}
.buff-list{font-size:12px;color:var(--tx2);margin:8px 0}
.buff-list span{color:var(--acc)}

/* Picker modal */
.modal-overlay{position:fixed;inset:0;z-index:1000;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:linear-gradient(180deg,#141428,#0c1428);border:1px solid rgba(255,255,255,.1);border-radius:22px 22px 0 0;width:100%;max-width:640px;max-height:90vh;display:flex;flex-direction:column}
.modal-handle{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,.15);margin:10px auto 6px}
.modal-header{padding:10px 18px 10px}
.modal-header-row{display:flex;justify-content:space-between;align-items:center}
.modal-title{font-size:18px;font-weight:700}
.modal-close{background:none;border:none;color:#888;font-size:26px;cursor:pointer;padding:6px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
.modal-search{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--bdr);background:rgba(0,0,0,.3);color:var(--tx);font-size:15px;margin-top:8px;font-family:inherit}
.modal-search:focus{outline:none;border-color:var(--tech)}
.filter-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;padding-bottom:4px}
.fbtn{padding:6px 10px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid var(--bdr);background:rgba(255,255,255,.03);color:var(--tx3);white-space:nowrap;min-height:34px}
.fbtn:active{transform:scale(.96)}
.fbtn.active{color:var(--tx);background:rgba(255,255,255,.1);border-color:var(--bdr2)}
.modal-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 14px 30px;display:flex;flex-direction:column;gap:6px}
.pick-card{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;border:1px solid var(--bdr);background:rgba(255,255,255,.02);cursor:pointer;flex-shrink:0}
.pick-card:active{background:rgba(255,255,255,.05)}
.pick-card .slot-name{font-size:14px}
.pick-card .slot-meta{font-size:11px;color:var(--tx3)}
.no-results{text-align:center;color:var(--tx3);padding:40px;font-size:15px}

.loading{min-height:60vh;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--tx3)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--bdr2);padding:10px 18px;border-radius:10px;font-size:13px;z-index:2000;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
.save-status{font-size:11px;color:var(--ok);margin-left:8px}
@media(min-width:640px){
  .modal{border-radius:22px;max-height:80vh;margin-bottom:5vh}
  .modal-overlay{align-items:center}
  .modal-handle{display:none}
}
@media(max-width:400px){
  .container{padding:12px}
  .panel{padding:14px}
  .result-summary{grid-template-columns:1fr 1fr}
  .result-card .val{font-size:18px}
  .statgrid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="header"><div class="header-inner">
  <div><div class="logo">🎯 DPS Calculator</div><div class="logo-sub" id="sub">Loading…</div></div>
</div></div>

<div class="container" id="app" style="display:none">
  <div class="page-nav">
    <a href="index.html">⚔️ Build</a>
    <a href="simulator.html" class="active">🎯 DPS Calc</a>
    <a href="skills.html">📚 Skills</a>
  </div>

  <!-- Build Section -->
  <div class="panel" id="build-panel"></div>

  <!-- Player Stats Section -->
  <div class="panel" id="player-panel"></div>

  <!-- Boss Stats Section -->
  <div class="panel" id="boss-panel"></div>

  <!-- Calculate -->
  <button class="calc-btn" onclick="calculate()">⚔️ Calculate DPS</button>

  <!-- Results -->
  <div id="results"></div>
</div>

<div class="loading" id="loading"><div><div style="font-size:38px">🎯</div><div>Loading skill database…</div></div></div>

<div class="modal-overlay" id="modal"><div class="modal">
  <div class="modal-handle"></div>
  <div class="modal-header"><div class="modal-header-row">
    <span class="modal-title" id="modal-title">Select Skill</span>
    <button class="modal-close" onclick="closeModal()">✕</button>
  </div>
  <input class="modal-search" id="modal-search" placeholder="Search skills…" oninput="renderPicker()" autocomplete="off" autocorrect="off" autocapitalize="off">
  <div class="filter-row" id="filter-row"></div>
  </div>
  <div class="modal-body" id="modal-body"></div>
</div></div>
<div class="toast" id="toast"></div>

<script src="simulator.js"></script>
</body>
</html>
